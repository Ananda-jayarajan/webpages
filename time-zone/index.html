<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Difference Converter</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --panel:#eeeeef;
      --text:#2e2e32;
      --muted:#8d8d92;
      --line:#ffffff;
      --blue:#6bbcff;
      --blue2:#a9d7f7;
      --blue3:#d7ecfb;
      --purple:#8758ff;
      --shadow:0 14px 35px rgba(0,0,0,.12);
      --radius:8px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#fff;
      color:var(--text);
    }
    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:0 12px 40px;
    }
    .hint{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:4px;
      font-size:18px;
      color:#333;
    }
    .hint-icon{
      width:25px;height:25px;border-radius:50%;
      border:2px solid #07a5dd;
      color:#07a5dd;
      display:grid;place-items:center;
      font-weight:700;
    }
    .date-nav{
      margin:20px 0;
      width:325px;
      height:43px;
      border:1px solid #dedede;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-around;
      background:#fff;
      color:#666;
      box-shadow:0 1px 2px rgba(0,0,0,.03);
    }
    .date-nav button{
      border:0;
      background:transparent;
      font-size:31px;
      line-height:1;
      color:#666;
      cursor:pointer;
      padding:0 8px;
    }
    .date-nav .today{
      font-size:18px;
      font-weight:700;
      color:#555;
      min-width:110px;
      text-align:center;
    }
    .converter-wrap{
      position:relative;
      width:min(456px,100%);
      display:grid;
      grid-template-columns:37px 1fr;
      column-gap:0;
    }
    .side-arrows{
      width:37px;
      padding-top:76px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:78px;
      color:#d3d3d3;
    }
    .chev{
      width:25px;height:25px;
      border-left:2px solid currentColor;
      border-top:2px solid currentColor;
    }
    .chev.up{transform:rotate(45deg)}
    .chev.down{transform:rotate(225deg)}
    .board{
      position:relative;
      background:var(--panel);
      border-radius:8px 8px 0 0;
      overflow:hidden;
      min-height:650px;
      box-shadow:0 18px 40px rgba(0,0,0,.06);
    }
    .headers{
      display:grid;
      grid-template-columns:1fr 1fr;
      padding:25px 36px 34px;
      gap:6px;
      color:#818181;
    }
    .city-title{
      font-size:22px;
      line-height:1.05;
      font-weight:700;
    }
    .city-sub{
      margin-top:1px;
      font-size:17px;
      font-weight:700;
      color:#b1b1b1;
    }
    .columns{
      width:calc(100% - 74px);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      position:relative;
    }
    .col{
      border-radius:8px;
      overflow:hidden;
    }
    .slot{
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid rgba(255,255,255,.35);
      font-size:22px;
      font-weight:800;
      color:#2c2c30;
      cursor:pointer;
      user-select:none;
      transition:filter .12s ease, transform .12s ease;
    }
    .slot:hover{filter:brightness(1.04)}
    .col.left .slot:nth-child(-n+5){background:#64b5f3}
    .col.left .slot:nth-child(n+6):nth-child(-n+8){background:#8cc8f3}
    .col.left .slot:nth-child(n+9){background:#b7dbf4}
    .col.right .slot:nth-child(-n+4){background:#8dcbf4}
    .col.right .slot:nth-child(n+5){background:#b7dbf4}
    .slot.night{background:#5eb0ef!important}
    .slot.selected{outline:3px solid rgba(135,88,255,.65);outline-offset:-3px}
    .current-bar{
      position:absolute;
      left:0;
      right:0;
      top:117px;
      height:45px;
      border:2px solid var(--purple);
      border-radius:8px;
      background:#fff;
      display:grid;
      grid-template-columns:34px 1fr 1fr 1fr;
      align-items:center;
      z-index:5;
      box-shadow:0 5px 14px rgba(0,0,0,.08);
      font-weight:700;
      cursor:grab;
      touch-action:none;
    }
    .current-bar:active{cursor:grabbing}
    .drag-dots{
      color:#252525;
      font-size:22px;
      letter-spacing:2px;
      text-align:center;
      line-height:.75;
      transform:rotate(90deg);
    }
    .bar-label{
      font-size:18px;
      color:#4d4d4d;
    }
    .bar-time{
      text-align:center;
      font-size:25px;
      color:#555;
      white-space:nowrap;
    }
    .bar-date{
      font-size:12px;
      color:#888;
      margin-right:5px;
      vertical-align:middle;
    }
    .settings{
      margin:22px auto 0;
      width:min(456px,100%);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    select{
      width:100%;
      padding:11px 10px;
      border:1px solid #d8d8d8;
      border-radius:8px;
      background:#fff;
      color:#333;
      font-weight:700;
    }
    @media(max-width:520px){
      .hint{font-size:14px}
      .date-nav{width:300px}
      .converter-wrap{grid-template-columns:25px 1fr}
      .side-arrows{width:25px}
      .headers{padding-left:25px;padding-right:25px}
      .columns{width:calc(100% - 50px)}
      .slot{font-size:18px;height:40px}
      .bar-time{font-size:19px}
      .bar-label{font-size:15px}
      .current-bar{grid-template-columns:26px 1fr 1fr 1fr}
      .settings{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="hint"><span class="hint-icon">i</span> Drag the handle or click on a cell to convert time</div>

    <nav class="date-nav" aria-label="Date controls">
      <button id="prevWeek" type="button">«</button>
      <button id="prevDay" type="button">‹</button>
      <div class="today" id="dateLabel">Today</div>
      <button id="nextDay" type="button">›</button>
      <button id="nextWeek" type="button">»</button>
    </nav>

    <section class="converter-wrap">
      <div class="side-arrows" aria-hidden="true">
        <div class="chev up"></div>
        <div class="chev down"></div>
      </div>

      <div class="board" id="board">
        <div class="headers">
          <div>
            <div class="city-title" id="leftCityTitle">Michigan</div>
            <div class="city-sub" id="leftSub">MI, Local time</div>
          </div>
          <div>
            <div class="city-title" id="rightCityTitle">London</div>
            <div class="city-sub" id="rightSub">BST</div>
          </div>
        </div>

        <div class="columns">
          <div class="col left" id="leftCol"></div>
          <div class="col right" id="rightCol"></div>
        </div>

        <div class="current-bar" id="currentBar" title="Drag up/down to change time">
          <div class="drag-dots">••<br>••</div>
          <div class="bar-label">Current time</div>
          <div class="bar-time" id="leftCurrent"></div>
          <div class="bar-time" id="rightCurrent"></div>
        </div>
      </div>
    </section>

    <section class="settings">
      <select id="leftZone"></select>
      <select id="rightZone"></select>
    </section>
  </main>

  <script>
    const zones = [
      {name:"Michigan", sub:"MI, Local time", tz:"America/Detroit"},
      {name:"London", sub:"London", tz:"Europe/London"},
      {name:"Chennai", sub:"India", tz:"Asia/Kolkata"},
      {name:"New Delhi", sub:"India", tz:"Asia/Kolkata"},
      {name:"Moscow", sub:"Russia", tz:"Europe/Moscow"},
      {name:"Jerusalem", sub:"Israel", tz:"Asia/Jerusalem"},
      {name:"Colombo", sub:"Sri Lanka", tz:"Asia/Colombo"},
      {name:"Doha", sub:"Qatar", tz:"Asia/Qatar"},
      {name:"Singapore", sub:"Singapore", tz:"Asia/Singapore"},
      {name:"Kuala Lumpur", sub:"Malaysia", tz:"Asia/Kuala_Lumpur"},
      {name:"Portland OR", sub:"Oregon", tz:"America/Los_Angeles"},
      {name:"Havana", sub:"Cuba", tz:"America/Havana"},
      {name:"Tehran", sub:"Iran", tz:"Asia/Tehran"},
      {name:"Shanghai", sub:"China", tz:"Asia/Shanghai"},
      {name:"Sydney", sub:"Australia", tz:"Australia/Sydney"},
      {name:"Auckland", sub:"New Zealand", tz:"Pacific/Auckland"},
      {name:"Lisbon", sub:"Portugal", tz:"Europe/Lisbon"},
      {name:"Buenos Aires", sub:"Argentina", tz:"America/Argentina/Buenos_Aires"}
    ];

    const state = {
      left: "America/Detroit",
      right: "Europe/London",
      baseDate: new Date(),
      selectedHour: new Date().getHours()
    };

    const slotH = 42;
    const barTopStart = 117;

    const $ = id => document.getElementById(id);
    const leftCol = $("leftCol");
    const rightCol = $("rightCol");
    const bar = $("currentBar");

    function zoneMeta(tz){ return zones.find(z => z.tz === tz) || zones[0]; }

    function fmtHour(date, tz){
      return new Intl.DateTimeFormat("en-US",{timeZone:tz,hour:"numeric",minute:"2-digit",hour12:true}).format(date);
    }
    function fmtAbbr(date, tz){
      const parts = new Intl.DateTimeFormat("en-US",{timeZone:tz,hour:"numeric",timeZoneName:"short"}).formatToParts(date);
      return parts.find(p => p.type === "timeZoneName")?.value || "";
    }
    function weekday(date, tz){
      return new Intl.DateTimeFormat("en-US",{timeZone:tz,weekday:"short"}).format(date).toUpperCase();
    }
    function dayStart(){
      const d = new Date(state.baseDate);
      d.setHours(0,0,0,0);
      return d;
    }
    function dateAtHour(h){
      const d = dayStart();
      d.setHours(h,0,0,0);
      return d;
    }
    function optionLabel(z){ return `${z.name} — ${z.tz}`; }

    function buildSelects(){
      ["leftZone","rightZone"].forEach(id => {
        const sel = $(id);
        sel.innerHTML = "";
        zones.forEach(z => {
          const opt = document.createElement("option");
          opt.value = z.tz;
          opt.textContent = optionLabel(z);
          sel.appendChild(opt);
        });
      });
      $("leftZone").value = state.left;
      $("rightZone").value = state.right;
    }

    function renderHeaders(){
      const l = zoneMeta(state.left), r = zoneMeta(state.right);
      $("leftCityTitle").textContent = l.name;
      $("leftSub").textContent = `${l.sub}, Local time`;
      $("rightCityTitle").textContent = r.name;
      $("rightSub").textContent = fmtAbbr(dateAtHour(state.selectedHour), state.right);
      $("dateLabel").textContent = sameDay(state.baseDate,new Date()) ? "Today" :
        new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric"}).format(state.baseDate);
    }

    function sameDay(a,b){
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function renderColumns(){
      leftCol.innerHTML = "";
      rightCol.innerHTML = "";

      for(let h=0; h<24; h++){
        const d = dateAtHour(h);
        leftCol.appendChild(slot(d, state.left, h));
        rightCol.appendChild(slot(d, state.right, h));
      }
    }

    function slot(d, tz, hour){
      const div = document.createElement("div");
      div.className = "slot" + (hour < 6 ? " night" : "") + (hour === state.selectedHour ? " selected" : "");
      div.textContent = fmtHour(d, tz).replace(":00", ":00");
      div.addEventListener("click", () => {
        state.selectedHour = hour;
        render();
      });
      return div;
    }

    function renderBar(){
      const d = dateAtHour(state.selectedHour);
      $("leftCurrent").innerHTML = `<span class="bar-date">${weekday(d,state.left)}</span>${fmtHour(d,state.left)}`;
      $("rightCurrent").innerHTML = `<span class="bar-date">${weekday(d,state.right)}</span>${fmtHour(d,state.right)}`;
      bar.style.top = `${barTopStart + state.selectedHour * slotH}px`;
    }

    function render(){
      $("leftZone").value = state.left;
      $("rightZone").value = state.right;
      renderHeaders();
      renderColumns();
      renderBar();
    }

    function moveDate(days){
      const d = new Date(state.baseDate);
      d.setDate(d.getDate() + days);
      state.baseDate = d;
      render();
    }

    $("leftZone").addEventListener("change", e => { state.left = e.target.value; render(); });
    $("rightZone").addEventListener("change", e => { state.right = e.target.value; render(); });
    $("prevDay").addEventListener("click", () => moveDate(-1));
    $("nextDay").addEventListener("click", () => moveDate(1));
    $("prevWeek").addEventListener("click", () => moveDate(-7));
    $("nextWeek").addEventListener("click", () => moveDate(7));

    let dragging = false;
    function setHourFromY(clientY){
      const rect = $("board").getBoundingClientRect();
      const y = clientY - rect.top - barTopStart + slotH/2;
      const h = Math.max(0, Math.min(23, Math.round(y / slotH)));
      if(h !== state.selectedHour){
        state.selectedHour = h;
        render();
      }
    }
    bar.addEventListener("pointerdown", e => {
      dragging = true;
      bar.setPointerCapture(e.pointerId);
      setHourFromY(e.clientY);
    });
    bar.addEventListener("pointermove", e => {
      if(dragging) setHourFromY(e.clientY);
    });
    bar.addEventListener("pointerup", () => dragging = false);
    bar.addEventListener("pointercancel", () => dragging = false);

    buildSelects();
    render();
    setInterval(() => {
      if(sameDay(state.baseDate,new Date())){
        state.selectedHour = new Date().getHours();
        render();
      }
    }, 60000);
  </script>
</body>
</html>
