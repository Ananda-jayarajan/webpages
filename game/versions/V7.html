<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cinematic Tamil Runner</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #080812;
  font-family: Inter, system-ui, Arial, sans-serif;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

.ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
  color: white;
}

.hud {
  position: absolute;
  top: 22px;
  left: 22px;
  right: 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
}

.brand,
.stats {
  padding: 12px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 35px rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.18);
}

.brand {
  font-weight: 800;
  letter-spacing: 0.4px;
}

.stats {
  display: flex;
  gap: 18px;
  font-weight: 700;
}

.center-screen {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}

.panel {
  width: 430px;
  max-width: 90vw;
  padding: 34px;
  border-radius: 28px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow: 0 30px 90px rgba(0,0,0,0.35);
  text-align: center;
}

.panel h1 {
  margin: 0 0 12px;
  font-size: 34px;
  line-height: 1.05;
}

.panel p {
  line-height: 1.55;
  color: rgba(255,255,255,0.86);
}

button {
  pointer-events: auto;
  border: 0;
  margin-top: 14px;
  padding: 14px 26px;
  border-radius: 999px;
  background: linear-gradient(135deg, #ffd76a, #ff9f68);
  color: #1b1024;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(255,180,80,0.35);
}

button:hover {
  transform: translateY(-1px) scale(1.03);
}

.controls {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  color: rgba(255,255,255,0.82);
  font-size: 14px;
  font-weight: 700;
}

.mobile-buttons {
  position: absolute;
  bottom: 68px;
  left: 0;
  right: 0;
  display: none;
  justify-content: center;
  gap: 18px;
  pointer-events: auto;
}

.mobile-buttons button {
  width: 112px;
  height: 58px;
  margin: 0;
  opacity: 0.9;
}

.hidden {
  display: none;
}

@media (max-width: 720px) {
  .stats {
    gap: 8px;
    font-size: 13px;
    padding: 10px 12px;
  }

  .brand {
    font-size: 13px;
    padding: 10px 12px;
  }

  .mobile-buttons {
    display: flex;
  }

  .controls {
    bottom: 18px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div class="ui">
  <div class="hud">
    <div class="brand">Villupuram Dream Run</div>
    <div class="stats">
      <span id="score">Score 0</span>
      <span id="votes">Votes 0</span>
      <span id="speed">Speed 0</span>
    </div>
  </div>

  <div class="mobile-buttons">
    <button id="slideBtn">Slide</button>
    <button id="jumpBtn">Jump</button>
  </div>

  <div class="controls">
    Space / ↑ Jump &nbsp; • &nbsp; ↓ Slide &nbsp; • &nbsp; Collect glowing votes
  </div>

  <div id="startScreen" class="center-screen">
    <div class="panel">
      <h1>Villupuram Dream Run</h1>
      <p>
        A cinematic 2D endless runner with rolling hills, glowing votes,
        atmospheric skies, mass-hero energy, and Alto-style flow.
      </p>
      <button id="startBtn">Start Journey</button>
    </div>
  </div>

  <div id="gameOverScreen" class="center-screen hidden">
    <div class="panel">
      <h1>Journey Ends</h1>
      <p id="finalText"></p>
      <button id="restartBtn">Run Again</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const votesEl = document.getElementById("votes");
const speedEl = document.getElementById("speed");

const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalText = document.getElementById("finalText");

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const jumpBtn = document.getElementById("jumpBtn");
const slideBtn = document.getElementById("slideBtn");

let W = window.innerWidth;
let H = window.innerHeight;
let DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

window.addEventListener("resize", resize);
resize();

const game = {
  running: false,
  time: 0,
  distance: 0,
  score: 0,
  votes: 0,
  speed: 360,
  targetSpeed: 360,
  gravity: 1900,
  cameraY: 0,
  shake: 0,
  weather: 0,
  slowmo: 1,
  flash: 0
};

const player = {
  x: 170,
  y: 0,
  vy: 0,
  width: 48,
  height: 108,
  grounded: true,
  sliding: false,
  slideTimer: 0,
  lean: 0,
  squash: 1
};

let obstacles = [];
let collectibles = [];
let particles = [];
let stars = [];
let fireflies = [];
let clouds = [];
let lastTime = performance.now();

const obstacleTypes = [
  { label: "Rising\\nSun", kind: "emblem" },
  { label: "Twin\\nLeaves", kind: "emblem" },
  { label: "Lotus", kind: "emblem" },
  { label: "Hand", kind: "emblem" },
  { label: "Tiger", kind: "emblem" },
  { label: "Flag", kind: "banner" },
  { label: "Media\\nDrone", kind: "drone" },
  { label: "Poster", kind: "poster" },
  { label: "Speaker", kind: "tower" },
  { label: "Cutout", kind: "cutout" }
];

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(v, a, b) {
  return Math.max(a, Math.min(b, v));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function terrainY(x) {
  const worldX = x + game.distance;
  const base = H * 0.72;

  const wave1 = Math.sin(worldX * 0.0032) * 52;
  const wave2 = Math.sin(worldX * 0.00135 + 2.4) * 74;
  const wave3 = Math.sin(worldX * 0.0075 + 1.1) * 16;

  return base + wave1 + wave2 + wave3;
}

function terrainSlope(x) {
  const a = terrainY(x - 4);
  const b = terrainY(x + 4);
  return Math.atan2(b - a, 8);
}

function createWorldObjects() {
  stars = [];
  fireflies = [];
  clouds = [];

  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.45,
      r: rand(0.4, 1.5),
      twinkle: rand(0, Math.PI * 2)
    });
  }

  for (let i = 0; i < 45; i++) {
    fireflies.push({
      x: Math.random() * W,
      y: rand(H * 0.45, H * 0.78),
      r: rand(1.2, 2.8),
      phase: rand(0, Math.PI * 2),
      speed: rand(6, 20)
    });
  }

  for (let i = 0; i < 8; i++) {
    clouds.push({
      x: Math.random() * W,
      y: rand(70, H * 0.38),
      w: rand(100, 240),
      h: rand(30, 70),
      speed: rand(6, 22),
      alpha: rand(0.08, 0.22)
    });
  }
}

function spawnObstacle() {
  const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
  const x = W + rand(180, 420);
  const high = Math.random() > 0.72;
  const ground = terrainY(x);

  obstacles.push({
    x,
    y: high ? ground - rand(150, 210) : ground - rand(70, 100),
    w: high ? 82 : 74,
    h: high ? 58 : 86,
    type,
    high,
    glow: rand(0, Math.PI * 2)
  });
}

function spawnCollectible() {
  const x = W + rand(320, 760);
  const ground = terrainY(x);

  collectibles.push({
    x,
    y: ground - rand(120, 240),
    r: 17,
    phase: rand(0, Math.PI * 2),
    collected: false
  });
}

function addParticle(x, y, color, count, spread, life) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x,
      y,
      vx: rand(-spread, spread),
      vy: rand(-spread * 0.8, spread * 0.3),
      r: rand(1.2, 4.2),
      life,
      maxLife: life,
      color
    });
  }
}

function resetGame() {
  game.running = true;
  game.time = 0;
  game.distance = 0;
  game.score = 0;
  game.votes = 0;
  game.speed = 360;
  game.targetSpeed = 360;
  game.cameraY = 0;
  game.shake = 0;
  game.weather = 0;
  game.slowmo = 1;
  game.flash = 0;

  player.x = Math.min(170, W * 0.25);
  player.y = terrainY(player.x) - player.height;
  player.vy = 0;
  player.grounded = true;
  player.sliding = false;
  player.slideTimer = 0;
  player.lean = 0;
  player.squash = 1;

  obstacles = [];
  collectibles = [];
  particles = [];

  createWorldObjects();

  for (let i = 0; i < 4; i++) spawnObstacle();
  for (let i = 0; i < 6; i++) spawnCollectible();

  startScreen.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
}

function endGame() {
  game.running = false;
  game.shake = 18;
  addParticle(player.x, player.y + player.height, "rgba(255,210,130,0.9)", 60, 240, 1.2);

  finalText.innerHTML = `
    Score: <strong>${game.score}</strong><br>
    Votes: <strong>${game.votes}</strong><br>
    Distance: <strong>${Math.floor(game.distance / 10)} m</strong>
  `;

  gameOverScreen.classList.remove("hidden");
}

function jump() {
  if (!game.running) return;

  if (player.grounded && !player.sliding) {
    player.vy = -720;
    player.grounded = false;
    player.squash = 0.82;
    addParticle(player.x + 20, player.y + player.height, "rgba(245,210,150,0.75)", 18, 120, 0.65);
  }
}

function slide() {
  if (!game.running) return;

  if (player.grounded && !player.sliding) {
    player.sliding = true;
    player.slideTimer = 0.62;
    player.squash = 0.7;
    addParticle(player.x + 20, player.y + player.height, "rgba(230,190,135,0.55)", 22, 160, 0.5);
  }
}

function update(dt) {
  if (!game.running) return;

  dt *= game.slowmo;

  game.time += dt;
  game.targetSpeed = 360 + game.time * 7;
  game.speed = lerp(game.speed, game.targetSpeed, 0.025);
  game.distance += game.speed * dt;

  const slope = terrainSlope(player.x);
  game.speed += Math.sin(slope) * 18 * dt;

  const ground = terrainY(player.x);
  const targetCameraY = ground - H * 0.72;
  game.cameraY = lerp(game.cameraY, targetCameraY, 0.08);

  player.lean = lerp(player.lean, clamp(slope * 1.7, -0.45, 0.45), 0.08);
  player.vy += game.gravity * dt;
  player.y += player.vy * dt;

  const playerGround = terrainY(player.x) - player.height;

  if (player.y >= playerGround) {
    if (!player.grounded && player.vy > 200) {
      addParticle(player.x + 20, playerGround + player.height, "rgba(245,210,150,0.7)", 26, 150, 0.7);
      game.shake = 5;
      player.squash = 0.76;
    }

    player.y = playerGround;
    player.vy = 0;
    player.grounded = true;
  } else {
    player.grounded = false;
  }

  if (player.sliding) {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) {
      player.sliding = false;
    }
  }

  player.squash = lerp(player.squash, 1, 0.12);

  updateObjects(dt);
  updateParticles(dt);
  updateAtmosphere(dt);
  checkCollisions();

  scoreEl.textContent = "Score " + game.score;
  votesEl.textContent = "Votes " + game.votes;
  speedEl.textContent = "Speed " + Math.floor(game.speed / 60);
}

function updateObjects(dt) {
  for (const o of obstacles) {
    o.x -= game.speed * dt;
    o.glow += dt * 3;
  }

  for (const c of collectibles) {
    c.x -= game.speed * dt;
    c.phase += dt * 4;
  }

  obstacles = obstacles.filter(o => o.x > -160);
  collectibles = collectibles.filter(c => c.x > -120 && !c.collected);

  while (obstacles.length < 4) spawnObstacle();
  while (collectibles.length < 6) spawnCollectible();
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 220 * dt;
    p.life -= dt;
  }

  particles = particles.filter(p => p.life > 0);

  if (player.grounded && game.running) {
    if (Math.random() < 0.45) {
      addParticle(
        player.x - 8,
        terrainY(player.x) - 8,
        "rgba(245,210,150,0.32)",
        1,
        65,
        0.7
      );
    }
  }
}

function updateAtmosphere(dt) {
  for (const f of fireflies) {
    f.x -= f.speed * dt;
    f.y += Math.sin(game.time * 2 + f.phase) * 0.15;
    if (f.x < -20) {
      f.x = W + 20;
      f.y = rand(H * 0.45, H * 0.78);
    }
  }

  for (const c of clouds) {
    c.x -= c.speed * dt;
    if (c.x + c.w < -80) {
      c.x = W + rand(60, 260);
      c.y = rand(70, H * 0.38);
    }
  }

  game.shake = Math.max(0, game.shake - dt * 30);
  game.flash = Math.max(0, game.flash - dt * 2);
}

function rectsHit(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function checkCollisions() {
  const ph = player.sliding ? 58 : player.height;
  const py = player.sliding ? player.y + player.height - ph : player.y;

  const pbox = {
    x: player.x + 12,
    y: py + 8,
    w: player.width - 18,
    h: ph - 14
  };

  for (const o of obstacles) {
    const obox = {
      x: o.x + 8,
      y: o.y + 8,
      w: o.w - 16,
      h: o.h - 16
    };

    if (rectsHit(pbox, obox)) {
      endGame();
      return;
    }
  }

  for (const c of collectibles) {
    const cbox = {
      x: c.x - c.r,
      y: c.y - c.r,
      w: c.r * 2,
      h: c.r * 2
    };

    if (rectsHit(pbox, cbox)) {
      c.collected = true;
      game.votes++;
      game.score += 10;
      game.flash = 0.35;
      addParticle(c.x, c.y, "rgba(255,215,106,0.95)", 32, 160, 0.9);
    }
  }

  game.score = Math.floor(game.distance / 25) + game.votes * 10;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const shakeX = game.shake ? rand(-game.shake, game.shake) : 0;
  const shakeY = game.shake ? rand(-game.shake, game.shake) : 0;

  ctx.save();
  ctx.translate(shakeX, shakeY - game.cameraY);

  drawSky();
  drawStars();
  drawMoon();
  drawClouds();
  drawMountains();
  drawMidground();
  drawTerrain();
  drawCollectibles();
  drawObstacles();
  drawPlayer();
  drawParticles();
  drawForegroundGrass();

  ctx.restore();

  drawVignette();
  drawFlash();
}

function drawSky() {
  const t = (Math.sin(game.time * 0.035) + 1) * 0.5;

  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, mixColor("#1b1641", "#090d24", t));
  g.addColorStop(0.36, mixColor("#573272", "#312b63", t));
  g.addColorStop(0.68, mixColor("#d9795f", "#91527c", t));
  g.addColorStop(1, mixColor("#f7d794", "#d9a46c", t));

  ctx.fillStyle = g;
  ctx.fillRect(0, -200, W, H + 400);

  const glow = ctx.createRadialGradient(W * 0.62, H * 0.68, 20, W * 0.62, H * 0.68, H * 0.6);
  glow.addColorStop(0, "rgba(255,210,130,0.38)");
  glow.addColorStop(1, "rgba(255,210,130,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
}

function mixColor(a, b, t) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);

  const r = Math.round(lerp(ca.r, cb.r, t));
  const g = Math.round(lerp(ca.g, cb.g, t));
  const bl = Math.round(lerp(ca.b, cb.b, t));

  return `rgb(${r},${g},${bl})`;
}

function hexToRgb(hex) {
  hex = hex.replace("#", "");
  return {
    r: parseInt(hex.substring(0, 2), 16),
    g: parseInt(hex.substring(2, 4), 16),
    b: parseInt(hex.substring(4, 6), 16)
  };
}

function drawStars() {
  ctx.save();
  ctx.globalAlpha = 0.32;

  for (const s of stars) {
    const tw = 0.45 + Math.sin(game.time * 2 + s.twinkle) * 0.35;
    ctx.fillStyle = `rgba(255,255,255,${tw})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  if (Math.floor(game.time) % 11 === 0) {
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W * 0.72, H * 0.18);
    ctx.lineTo(W * 0.78, H * 0.12);
    ctx.stroke();
  }

  ctx.restore();
}

function drawMoon() {
  const x = W * 0.82;
  const y = H * 0.16;

  const glow = ctx.createRadialGradient(x, y, 10, x, y, 95);
  glow.addColorStop(0, "rgba(255,240,190,0.45)");
  glow.addColorStop(1, "rgba(255,240,190,0)");

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 96, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(255,238,188,0.92)";
  ctx.beginPath();
  ctx.arc(x, y, 38, 0, Math.PI * 2);
  ctx.fill();
}

function drawClouds() {
  for (const c of clouds) {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = "white";
    roundedCloud(c.x, c.y, c.w, c.h);
    ctx.restore();
  }
}

function roundedCloud(x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.32, h * 0.5, 0, 0, Math.PI * 2);
  ctx.ellipse(x + w * 0.25, y - h * 0.15, w * 0.28, h * 0.58, 0, 0, Math.PI * 2);
  ctx.ellipse(x + w * 0.52, y, w * 0.35, h * 0.52, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawMountains() {
  drawMountainLayer("#1e1738", 0.18, H * 0.53, 230, 0.62);
  drawMountainLayer("#251b42", 0.32, H * 0.60, 190, 0.75);
  drawMountainLayer("#132c2c", 0.55, H * 0.69, 145, 0.95);
}

function drawMountainLayer(color, parallax, baseY, height, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;

  const offset = -(game.distance * parallax) % W;

  for (let k = -1; k < 3; k++) {
    const startX = offset + k * W;
    ctx.beginPath();
    ctx.moveTo(startX, H + 200);
    ctx.lineTo(startX, baseY);

    for (let i = 0; i <= 8; i++) {
      const x = startX + (i / 8) * W;
      const peak = baseY - height * (0.45 + 0.55 * Math.abs(Math.sin(i * 1.7 + k)));
      ctx.lineTo(x + W / 16, peak);
      ctx.lineTo(x + W / 8, baseY + 20);
    }

    ctx.lineTo(startX + W, H + 200);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawMidground() {
  ctx.save();
  ctx.fillStyle = "rgba(13,36,34,0.78)";
  const offset = -(game.distance * 0.72) % 420;

  for (let x = offset - 420; x < W + 420; x += 420) {
    ctx.beginPath();
    ctx.ellipse(x + 220, H * 0.72, 300, 90, 0, Math.PI, 0);
    ctx.fill();

    drawTempleSilhouette(x + 70, H * 0.62);
    drawFlag(x + 290, H * 0.60);
  }

  ctx.restore();
}

function drawTempleSilhouette(x, y) {
  ctx.save();
  ctx.fillStyle = "rgba(10,24,30,0.42)";
  ctx.fillRect(x, y, 60, 70);
  ctx.beginPath();
  ctx.moveTo(x - 8, y);
  ctx.lineTo(x + 30, y - 45);
  ctx.lineTo(x + 68, y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFlag(x, y) {
  ctx.save();
  ctx.strokeStyle = "rgba(255,220,170,0.28)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + 95);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,220,170,0.22)";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + 42, y + 8 + Math.sin(game.time * 3) * 8, x + 72, y + 3);
  ctx.lineTo(x + 72, y + 30);
  ctx.quadraticCurveTo(x + 38, y + 38, x, y + 26);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTerrain() {
  ctx.save();

  const grad = ctx.createLinearGradient(0, H * 0.58, 0, H + 200);
  grad.addColorStop(0, "#143c36");
  grad.addColorStop(1, "#081b19");

  ctx.fillStyle = grad;
  ctx.beginPath();

  ctx.moveTo(0, H + 300);

  for (let x = 0; x <= W + 10; x += 10) {
    ctx.lineTo(x, terrainY(x));
  }

  ctx.lineTo(W + 10, H + 300);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "rgba(255,220,160,0.8)";
  ctx.lineWidth = 3;
  ctx.beginPath();

  for (let x = 0; x <= W + 10; x += 10) {
    const y = terrainY(x);
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();

  ctx.restore();
}

function drawForegroundGrass() {
  ctx.save();
  ctx.strokeStyle = "rgba(255,220,170,0.18)";
  ctx.lineWidth = 1;

  const offset = -(game.distance * 1.15) % 28;

  for (let x = offset; x < W; x += 28) {
    const y = terrainY(x);
    const h = 10 + Math.sin(game.time * 4 + x) * 4;
    ctx.beginPath();
    ctx.moveTo(x, y + 4);
    ctx.quadraticCurveTo(x + 5, y - h, x + 2, y - h - 8);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPlayer() {
  ctx.save();

  const px = player.x;
  const py = player.y;
  const run = game.time * 12;
  const slideScale = player.sliding ? 0.62 : 1;
  const squashY = player.squash * slideScale;
  const squashX = 1 + (1 - player.squash) * 0.25;

  ctx.translate(px + player.width / 2, py + player.height);
  ctx.rotate(player.lean + (player.sliding ? 0.32 : 0));
  ctx.scale(squashX, squashY);
  ctx.translate(-player.width / 2, -player.height);

  const limbSwing = Math.sin(run) * 0.65;
  const coatSwing = Math.sin(run * 0.7) * 5;

  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(28, 116, 38, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  drawArm(8, 46, -limbSwing);
  drawArm(56, 46, limbSwing);

  drawLeg(22, 93, limbSwing);
  drawLeg(43, 93, -limbSwing);

  ctx.fillStyle = "#050507";
  roundRect(11, 38, 52, 60, 12);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(29, 43);
  ctx.lineTo(45, 43);
  ctx.lineTo(39, 88);
  ctx.lineTo(34, 88);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#731515";
  roundRect(36, 48, 5, 35, 3);
  ctx.fill();

  ctx.fillStyle = "#050507";
  ctx.beginPath();
  ctx.moveTo(14, 90);
  ctx.quadraticCurveTo(35 + coatSwing, 112, 62, 92);
  ctx.lineTo(58, 120);
  ctx.quadraticCurveTo(35, 132, 12, 120);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#b9784e";
  ctx.beginPath();
  ctx.arc(37, 22, 18, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#080808";
  ctx.beginPath();
  ctx.ellipse(37, 9, 28, 15, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#090909";
  roundRect(23, 18, 13, 8, 4);
  ctx.fill();
  roundRect(39, 18, 13, 8, 4);
  ctx.fill();

  ctx.strokeStyle = "#090909";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(36, 22);
  ctx.lineTo(40, 22);
  ctx.stroke();

  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.ellipse(37, 31, 9, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawArm(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = "#050507";
  roundRect(-6, 0, 13, 43, 8);
  ctx.fill();
  ctx.restore();
}

function drawLeg(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = "#050507";
  roundRect(-7, 0, 16, 42, 8);
  ctx.fill();

  ctx.fillStyle = "#080808";
  roundRect(-10, 35, 24, 8, 5);
  ctx.fill();
  ctx.restore();
}

function drawCollectibles() {
  for (const c of collectibles) {
    const pulse = 1 + Math.sin(c.phase) * 0.14;

    const glow = ctx.createRadialGradient(c.x, c.y, 2, c.x, c.y, 45);
    glow.addColorStop(0, "rgba(255,215,106,0.9)");
    glow.addColorStop(1, "rgba(255,215,106,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 46 * pulse, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(c.x, c.y + Math.sin(c.phase) * 5);
    ctx.scale(pulse, pulse);

    ctx.fillStyle = "#ffd76a";
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#3a2238";
    ctx.font = "900 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("V", 0, 1);

    ctx.restore();
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    ctx.save();

    const pulse = 1 + Math.sin(o.glow) * 0.04;
    ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-o.w / 2, -o.h / 2);

    const glow = ctx.createRadialGradient(o.w / 2, o.h / 2, 10, o.w / 2, o.h / 2, 80);
    glow.addColorStop(0, "rgba(255,255,255,0.45)");
    glow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(o.w / 2, o.h / 2, 78, 0, Math.PI * 2);
    ctx.fill();

    if (o.type.kind === "drone") {
      drawDrone(o);
    } else if (o.type.kind === "tower") {
      drawSpeaker(o);
    } else if (o.type.kind === "banner") {
      drawBanner(o);
    } else if (o.type.kind === "cutout") {
      drawCutout(o);
    } else {
      drawEmblem(o);
    }

    ctx.restore();
  }
}

function drawEmblem(o) {
  ctx.fillStyle = "rgba(255,255,255,0.84)";
  roundRect(0, 0, o.w, o.h, 24);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,220,180,0.9)";
  ctx.lineWidth = 2;
  roundRect(2, 2, o.w - 4, o.h - 4, 22);
  ctx.stroke();

  ctx.fillStyle = "#2f2540";
  ctx.font = "900 13px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const lines = o.type.label.split("\\n");
  lines.forEach((line, i) => {
    ctx.fillText(line, o.w / 2, o.h / 2 + (i - (lines.length - 1) / 2) * 15);
  });
}

function drawDrone(o) {
  ctx.strokeStyle = "rgba(255,255,255,0.86)";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(15, 24);
  ctx.lineTo(o.w - 15, 24);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.88)";
  roundRect(22, 26, o.w - 44, 26, 10);
  ctx.fill();

  ctx.fillStyle = "rgba(255,215,106,0.85)";
  ctx.beginPath();
  ctx.arc(14, 24, 10, 0, Math.PI * 2);
  ctx.arc(o.w - 14, 24, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#2f2540";
  ctx.font = "800 10px Arial";
  ctx.textAlign = "center";
  ctx.fillText("MEDIA", o.w / 2, 43);
}

function drawSpeaker(o) {
  ctx.fillStyle = "rgba(255,255,255,0.88)";
  roundRect(20, 5, 44, 74, 10);
  ctx.fill();

  ctx.fillStyle = "#2f2540";
  ctx.beginPath();
  ctx.arc(42, 27, 13, 0, Math.PI * 2);
  ctx.arc(42, 56, 10, 0, Math.PI * 2);
  ctx.fill();
}

function drawBanner(o) {
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  roundRect(0, 15, o.w, 46, 12);
  ctx.fill();

  ctx.fillStyle = "#2f2540";
  ctx.font = "900 12px Arial";
  ctx.textAlign = "center";
  ctx.fillText("FAKE", o.w / 2, 34);
  ctx.fillText("NEWS", o.w / 2, 49);
}

function drawCutout(o) {
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.beginPath();
  ctx.arc(o.w / 2, 25, 24, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(255,255,255,0.78)";
  roundRect(14, 49, o.w - 28, 34, 9);
  ctx.fill();

  ctx.fillStyle = "#2f2540";
  ctx.font = "900 11px Arial";
  ctx.textAlign = "center";
  ctx.fillText("CUTOUT", o.w / 2, 69);
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  for (const f of fireflies) {
    const a = 0.35 + Math.sin(game.time * 3 + f.phase) * 0.25;
    ctx.fillStyle = `rgba(255,220,120,${a})`;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.8);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,0.42)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawFlash() {
  if (game.flash > 0) {
    ctx.fillStyle = `rgba(255,220,120,${game.flash})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function loop(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;

  dt = Math.min(dt, 0.033);

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }

  if (e.code === "ArrowDown") {
    e.preventDefault();
    slide();
  }
});

let touchStartY = 0;

canvas.addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  const endY = e.changedTouches[0].clientY;
  const diff = touchStartY - endY;

  if (diff > 38) jump();
  if (diff < -38) slide();
});

startBtn.addEventListener("click", resetGame);
restartBtn.addEventListener("click", resetGame);
jumpBtn.addEventListener("click", jump);
slideBtn.addEventListener("click", slide);

createWorldObjects();
requestAnimationFrame(loop);
</script>

</body>
</html>
