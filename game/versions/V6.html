<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Political Alto Runner</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #101014;
}

#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(#211742 0%, #54346f 35%, #d8795f 68%, #f7d794 100%);
}

/* Background */
.moon {
  position: absolute;
  top: 70px;
  right: 120px;
  width: 90px;
  height: 90px;
  background: #fff3c4;
  border-radius: 50%;
  box-shadow: 0 0 45px #fff3c4;
}

.stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-size: 90px 90px, 140px 140px;
  background-position: 20px 30px, 60px 80px;
  opacity: 0.35;
}

.mountain {
  position: absolute;
  bottom: 28%;
  width: 130%;
  height: 260px;
  background: #241b3d;
  clip-path: polygon(
    0 100%,
    12% 45%,
    24% 100%,
    38% 35%,
    52% 100%,
    68% 42%,
    82% 100%,
    100% 50%,
    100% 100%
  );
  opacity: 0.65;
}

.hill {
  position: absolute;
  bottom: 20%;
  left: -10%;
  width: 130%;
  height: 200px;
  background: #182f2c;
  border-radius: 50% 50% 0 0;
}

.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 28%;
  background: #102822;
  border-top: 6px solid #f7d794;
  box-shadow: 0 -10px 30px rgba(247, 215, 148, 0.35);
}

/* HUD */
.hud {
  position: absolute;
  top: 16px;
  left: 18px;
  right: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 40;
  color: white;
  font-weight: 900;
  text-shadow: 2px 2px 4px #000;
}

.title {
  font-size: 22px;
}

.stats {
  display: flex;
  gap: 18px;
  font-size: 18px;
}

/* Player */
.player {
  position: absolute;
  left: 95px;
  bottom: 28%;
  width: 74px;
  height: 126px;
  z-index: 20;
  transition: transform 0.15s ease, height 0.15s ease;
}

.player.slide {
  height: 72px;
  transform: rotate(8deg);
}

.head {
  position: absolute;
  top: 0;
  left: 19px;
  width: 36px;
  height: 38px;
  background: #c88755;
  border: 3px solid #111;
  border-radius: 50%;
  z-index: 3;
}

.hair {
  position: absolute;
  top: -4px;
  left: 11px;
  width: 52px;
  height: 24px;
  background: #111;
  border-radius: 60% 60% 35% 35%;
  z-index: 4;
}

.glasses {
  position: absolute;
  top: 15px;
  left: 22px;
  width: 30px;
  height: 9px;
  z-index: 5;
}

.glasses::before,
.glasses::after {
  content: "";
  position: absolute;
  width: 13px;
  height: 9px;
  background: #111;
  border-radius: 4px;
}

.glasses::before {
  left: 0;
}

.glasses::after {
  right: 0;
}

.mustache {
  position: absolute;
  top: 28px;
  left: 29px;
  width: 16px;
  height: 4px;
  background: #111;
  border-radius: 50%;
  z-index: 5;
}

.suit {
  position: absolute;
  top: 38px;
  left: 10px;
  width: 54px;
  height: 60px;
  background: #050505;
  border: 3px solid #111;
  border-radius: 12px 12px 5px 5px;
  z-index: 2;
}

.suit::before {
  content: "";
  position: absolute;
  top: 5px;
  left: 18px;
  width: 14px;
  height: 43px;
  background: white;
  clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
}

.suit::after {
  content: "";
  position: absolute;
  top: 8px;
  left: 23px;
  width: 5px;
  height: 33px;
  background: #8b1e1e;
  border-radius: 3px;
}

.arm,
.leg {
  position: absolute;
  background: #050505;
  border: 3px solid #111;
  transform-origin: top center;
}

.arm {
  top: 47px;
  width: 15px;
  height: 43px;
  border-radius: 12px;
}

.arm.left {
  left: 0;
  animation: armA 0.28s infinite alternate ease-in-out;
}

.arm.right {
  right: 0;
  animation: armB 0.28s infinite alternate ease-in-out;
}

.leg {
  top: 96px;
  width: 18px;
  height: 38px;
  border-radius: 0 0 9px 9px;
}

.leg.left {
  left: 18px;
  animation: legA 0.28s infinite alternate ease-in-out;
}

.leg.right {
  right: 18px;
  animation: legB 0.28s infinite alternate ease-in-out;
}

.player.slide .arm,
.player.slide .leg {
  display: none;
}

.player.slide .head,
.player.slide .hair,
.player.slide .glasses,
.player.slide .mustache {
  transform: translateY(26px);
}

@keyframes armA {
  from { transform: rotate(35deg); }
  to { transform: rotate(-35deg); }
}

@keyframes armB {
  from { transform: rotate(-35deg); }
  to { transform: rotate(35deg); }
}

@keyframes legA {
  from { transform: rotate(-28deg); }
  to { transform: rotate(28deg); }
}

@keyframes legB {
  from { transform: rotate(28deg); }
  to { transform: rotate(-28deg); }
}

/* Obstacles */
.obstacle {
  position: absolute;
  right: -120px;
  bottom: 28%;
  width: 88px;
  height: 88px;
  background: rgba(255, 255, 255, 0.9);
  border: 3px solid rgba(255, 255, 255, 0.85);
  border-radius: 24px;
  box-shadow: 0 0 25px rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(6px);
  color: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 18;
  font-weight: 900;
  font-size: 13px;
  overflow: hidden;
}

.obstacle.high {
  bottom: calc(28% + 100px);
}

.obstacle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.vote {
  position: absolute;
  right: -80px;
  bottom: calc(28% + 150px);
  width: 46px;
  height: 46px;
  background: #ffd76a;
  border-radius: 50%;
  box-shadow: 0 0 25px #ffd76a;
  color: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 900;
  z-index: 17;
}

/* Screens */
.screen {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.48);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

#gameOver {
  display: none;
}

.panel {
  width: 420px;
  max-width: 90vw;
  background: rgba(255, 255, 255, 0.94);
  border-radius: 24px;
  padding: 32px;
  text-align: center;
  color: #111;
  box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
}

.panel h1 {
  margin: 0 0 12px;
  font-size: 34px;
}

.panel p {
  font-size: 17px;
  line-height: 1.5;
}

button {
  border: none;
  background: #ffd76a;
  color: #111;
  padding: 13px 26px;
  border-radius: 999px;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
}

button:hover {
  transform: scale(1.04);
}

.touch-buttons {
  position: absolute;
  bottom: 72px;
  left: 0;
  right: 0;
  z-index: 60;
  display: flex;
  justify-content: center;
  gap: 18px;
}

.touch-buttons button {
  width: 105px;
  height: 58px;
  opacity: 0.9;
}

.instructions {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  z-index: 60;
  text-align: center;
  color: white;
  font-weight: 800;
  text-shadow: 2px 2px 4px #000;
}

@media (max-width: 700px) {
  .player {
    left: 55px;
    transform: scale(0.85);
  }

  .title {
    font-size: 17px;
  }

  .stats {
    font-size: 14px;
    gap: 10px;
  }

  .instructions {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div id="game">
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="mountain"></div>
  <div class="hill"></div>

  <div class="hud">
    <div class="title">The Villupuram Run</div>
    <div class="stats">
      <div id="scoreText">Score: 0</div>
      <div id="voteText">Votes: 0</div>
      <div id="speedText">Speed: 5.0</div>
    </div>
  </div>

  <div id="player" class="player">
    <div class="head"></div>
    <div class="hair"></div>
    <div class="glasses"></div>
    <div class="mustache"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="suit"></div>
    <div class="leg left"></div>
    <div class="leg right"></div>
  </div>

  <div id="obstacle" class="obstacle"></div>
  <div id="vote" class="vote">+1</div>
  <div class="ground"></div>

  <div class="touch-buttons">
    <button onclick="slide()">Slide</button>
    <button onclick="jump()">Jump</button>
  </div>

  <div class="instructions">
    Space / ↑ = Jump &nbsp; | &nbsp; ↓ = Slide &nbsp; | &nbsp; Collect votes
  </div>

  <div id="startScreen" class="screen">
    <div class="panel">
      <h1>The Villupuram Run</h1>
      <p>
        A calm Alto-style endless runner. Jump, slide, collect glowing votes,
        and avoid political-symbol obstacles.
      </p>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <div id="gameOver" class="screen">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore"></p>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const vote = document.getElementById("vote");

const scoreText = document.getElementById("scoreText");
const voteText = document.getElementById("voteText");
const speedText = document.getElementById("speedText");

const startScreen = document.getElementById("startScreen");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

/*
You can replace image: "" with direct image URLs.

Example:
{ label: "DMK Rising Sun", image: "https://example.com/dmk.png" }

Use direct .png, .jpg, .webp, or .svg links.
*/
const obstacles = [
  { label: "DMK<br>Rising Sun", image: "" },
  { label: "ADMK<br>Leaves", image: "" },
  { label: "BJP<br>Lotus", image: "" },
  { label: "Congress<br>Hand", image: "" },
  { label: "NTK<br>Symbol", image: "" },
  { label: "VCK<br>Symbol", image: "" },
  { label: "IUML<br>Symbol", image: "" },
  { label: "CPI<br>Symbol", image: "" },
  { label: "CPM<br>Symbol", image: "" },
  { label: "Cartoon<br>Rival", image: "" }
];

let running = false;
let animationId;

let playerY = 0;
let velocityY = 0;
let gravity = 0.9;
let jumpPower = 19;
let sliding = false;

let obstacleX = 1000;
let voteX = 1300;

let speed = 5;
let score = 0;
let votes = 0;

function startGame() {
  startScreen.style.display = "none";
  gameOver.style.display = "none";
  resetGame();
  running = true;
  createObstacle();
  gameLoop();
}

function restartGame() {
  startGame();
}

function resetGame() {
  playerY = 0;
  velocityY = 0;
  sliding = false;

  obstacleX = game.clientWidth + 250;
  voteX = game.clientWidth + 650;

  speed = 5;
  score = 0;
  votes = 0;

  player.classList.remove("slide");
  updateHud();
}

function updateHud() {
  scoreText.textContent = "Score: " + score;
  voteText.textContent = "Votes: " + votes;
  speedText.textContent = "Speed: " + speed.toFixed(1);
}

function createObstacle() {
  const item = obstacles[Math.floor(Math.random() * obstacles.length)];
  const highObstacle = Math.random() > 0.68;

  obstacle.className = highObstacle ? "obstacle high" : "obstacle";

  if (item.image && item.image.trim() !== "") {
    obstacle.innerHTML = `<img src="${item.image}" alt="${item.label}">`;
  } else {
    obstacle.innerHTML = item.label;
  }
}

function jump() {
  if (!running || sliding) return;

  if (playerY === 0) {
    velocityY = jumpPower;
    player.style.transform = "rotate(-6deg)";
    setTimeout(() => {
      player.style.transform = "rotate(0deg)";
    }, 180);
  }
}

function slide() {
  if (!running || playerY > 0 || sliding) return;

  sliding = true;
  player.classList.add("slide");

  setTimeout(() => {
    sliding = false;
    player.classList.remove("slide");
  }, 650);
}

function gameLoop() {
  if (!running) return;

  velocityY -= gravity;
  playerY += velocityY;

  if (playerY <= 0) {
    playerY = 0;
    velocityY = 0;
  }

  player.style.bottom = `calc(28% + ${playerY}px)`;

  obstacleX -= speed;
  voteX -= speed;

  if (obstacleX < -140) {
    obstacleX = game.clientWidth + 250 + Math.random() * 420;
    score++;
    speed += 0.15;
    createObstacle();
    updateHud();
  }

  if (voteX < -90) {
    voteX = game.clientWidth + 600 + Math.random() * 550;
    vote.style.bottom = `calc(28% + ${135 + Math.random() * 120}px)`;
  }

  obstacle.style.right = game.clientWidth - obstacleX + "px";
  vote.style.right = game.clientWidth - voteX + "px";

  checkObstacleCollision();
  checkVoteCollection();

  animationId = requestAnimationFrame(gameLoop);
}

function checkObstacleCollision() {
  const p = player.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();

  const hit =
    p.left < o.right - 14 &&
    p.right > o.left + 14 &&
    p.top < o.bottom - 14 &&
    p.bottom > o.top + 14;

  if (hit) {
    endGame();
  }
}

function checkVoteCollection() {
  const p = player.getBoundingClientRect();
  const v = vote.getBoundingClientRect();

  const collected =
    p.left < v.right &&
    p.right > v.left &&
    p.top < v.bottom &&
    p.bottom > v.top;

  if (collected) {
    votes++;
    score += 5;
    voteX = game.clientWidth + 700 + Math.random() * 500;
    updateHud();
  }
}

function endGame() {
  running = false;
  cancelAnimationFrame(animationId);

  finalScore.innerHTML = `
    <strong>Score:</strong> ${score}<br>
    <strong>Votes:</strong> ${votes}<br>
    <strong>Top Speed:</strong> ${speed.toFixed(1)}
  `;

  gameOver.style.display = "flex";
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }

  if (e.code === "ArrowDown") {
    e.preventDefault();
    slide();
  }
});

let touchStartY = 0;

game.addEventListener("touchstart", function(e) {
  touchStartY = e.touches[0].clientY;
});

game.addEventListener("touchend", function(e) {
  const endY = e.changedTouches[0].clientY;
  const diff = touchStartY - endY;

  if (diff > 40) {
    jump();
  }

  if (diff < -40) {
    slide();
  }
});
</script>

</body>
</html>
