<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Suit Runner</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(#1b1b28, #0b0b12);
  display: flex;
  justify-content: center;
  align-items: center;
}

.game {
  width: 900px;
  max-width: 95vw;
  height: 430px;
  background: linear-gradient(#77d8ff 0 62%, #4caf50 62% 100%);
  border: 5px solid #111;
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 25px 70px rgba(0,0,0,0.45);
}

.score {
  position: absolute;
  top: 18px;
  right: 24px;
  font-size: 24px;
  font-weight: 800;
  z-index: 20;
}

.title {
  position: absolute;
  top: 18px;
  left: 24px;
  font-size: 24px;
  font-weight: 900;
  z-index: 20;
}

/* Background */
.sun {
  position: absolute;
  top: 42px;
  right: 120px;
  width: 70px;
  height: 70px;
  background: #ffd54f;
  border-radius: 50%;
}

.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.9;
  animation: cloudMove 18s linear infinite;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud.one {
  width: 110px;
  height: 35px;
  top: 85px;
  left: 900px;
}

.cloud.one::before {
  width: 50px;
  height: 50px;
  left: 15px;
  top: -22px;
}

.cloud.one::after {
  width: 60px;
  height: 60px;
  right: 12px;
  top: -28px;
}

.cloud.two {
  width: 140px;
  height: 40px;
  top: 145px;
  left: 1150px;
  animation-delay: 5s;
}

.cloud.two::before {
  width: 55px;
  height: 55px;
  left: 20px;
  top: -22px;
}

.cloud.two::after {
  width: 65px;
  height: 65px;
  right: 18px;
  top: -30px;
}

@keyframes cloudMove {
  from { transform: translateX(0); }
  to { transform: translateX(-1250px); }
}

/* Ground */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 92px;
  background: linear-gradient(#8b5a2b 0 28%, #5d3518 28% 100%);
  border-top: 5px solid #1f8f32;
}

.ground::after {
  content: "";
  position: absolute;
  inset: 25px 0 0;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.12) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.12) 25%, transparent 25%);
  background-size: 40px 40px;
}

/* Player */
.player {
  position: absolute;
  left: 90px;
  bottom: 92px;
  width: 58px;
  height: 100px;
  z-index: 10;
}

/* Head */
.player::before {
  content: "";
  position: absolute;
  top: 0;
  left: 14px;
  width: 30px;
  height: 32px;
  background: #c98755;
  border: 3px solid #111;
  border-radius: 50%;
}

/* Hair */
.player::after {
  content: "";
  position: absolute;
  top: -2px;
  left: 10px;
  width: 38px;
  height: 18px;
  background: #111;
  border-radius: 50% 50% 35% 35%;
}

/* Sunglasses */
.glasses {
  position: absolute;
  top: 13px;
  left: 17px;
  width: 24px;
  height: 8px;
  z-index: 2;
}

.glasses::before,
.glasses::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 7px;
  background: #111;
  border-radius: 4px;
}

.glasses::before {
  left: 0;
}

.glasses::after {
  right: 0;
}

.mustache {
  position: absolute;
  top: 23px;
  left: 23px;
  width: 13px;
  height: 4px;
  background: #111;
  border-radius: 50%;
  z-index: 2;
}

/* Suit */
.suit-body {
  position: absolute;
  top: 32px;
  left: 8px;
  width: 42px;
  height: 48px;
  background: #050505;
  border: 3px solid #111;
  border-radius: 10px 10px 4px 4px;
}

.suit-body::before {
  content: "";
  position: absolute;
  top: 3px;
  left: 12px;
  width: 13px;
  height: 36px;
  background: white;
  clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
}

.suit-body::after {
  content: "";
  position: absolute;
  top: 6px;
  left: 17px;
  width: 5px;
  height: 28px;
  background: #8b1e1e;
  border-radius: 3px;
}

.arm {
  position: absolute;
  top: 40px;
  width: 13px;
  height: 36px;
  background: #050505;
  border: 3px solid #111;
  border-radius: 10px;
}

.arm.left {
  left: -1px;
  transform: rotate(18deg);
}

.arm.right {
  right: -1px;
  transform: rotate(-18deg);
}

.legs {
  position: absolute;
  top: 78px;
  left: 9px;
  display: flex;
  gap: 8px;
}

.legs div {
  width: 15px;
  height: 30px;
  background: #050505;
  border: 3px solid #111;
  border-radius: 0 0 8px 8px;
}

/* Obstacle */
.obstacle {
  position: absolute;
  bottom: 92px;
  right: -70px;
  width: 48px;
  height: 54px;
  background: #8b3f1f;
  border: 3px solid #111;
  border-radius: 8px;
  z-index: 8;
}

.obstacle::before {
  content: "!";
  position: absolute;
  top: -35px;
  left: 9px;
  font-size: 28px;
  font-weight: 900;
  color: red;
}

.obstacle::after {
  content: "Fake";
  position: absolute;
  bottom: 12px;
  left: 5px;
  color: white;
  font-size: 11px;
  font-weight: 800;
}

/* Collectible */
.vote {
  position: absolute;
  bottom: 180px;
  right: -60px;
  width: 38px;
  height: 38px;
  background: #ffd700;
  border: 3px solid #111;
  border-radius: 50%;
  z-index: 7;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 900;
}

/* Screens */
.start-screen,
.game-over {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 50;
}

.game-over {
  display: none;
}

.panel {
  background: white;
  color: #111;
  padding: 28px 34px;
  border-radius: 18px;
  border: 4px solid #111;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}

.panel h1 {
  margin: 0 0 10px;
  font-size: 34px;
}

.panel p {
  margin: 8px 0 18px;
  font-size: 17px;
}

.panel button {
  border: 3px solid #111;
  background: #ffcc00;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
}

.panel button:hover {
  transform: scale(1.05);
}

.mobile-jump {
  display: none;
  position: absolute;
  bottom: 115px;
  right: 18px;
  z-index: 30;
  width: 84px;
  height: 84px;
  border-radius: 50%;
  border: 3px solid #111;
  background: rgba(255, 204, 0, 0.9);
  font-size: 30px;
  font-weight: 900;
}

@media (max-width: 650px) {
  .game {
    height: 380px;
  }

  .mobile-jump {
    display: block;
  }

  .score,
  .title {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="game" id="game">
  <div class="title">Suit Runner</div>
  <div class="score" id="score">Score: 0 | Votes: 0</div>

  <div class="sun"></div>
  <div class="cloud one"></div>
  <div class="cloud two"></div>

  <div class="player" id="player">
    <div class="glasses"></div>
    <div class="mustache"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="suit-body"></div>
    <div class="legs">
      <div></div>
      <div></div>
    </div>
  </div>

  <div class="obstacle" id="obstacle"></div>
  <div class="vote" id="vote">V</div>
  <div class="ground"></div>

  <button class="mobile-jump" id="mobileJump">↑</button>

  <div class="start-screen" id="startScreen">
    <div class="panel">
      <h1>Suit Runner</h1>
      <p>Jump over fake news. Collect votes.</p>
      <p>Press Space / ↑ / Tap to jump.</p>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const vote = document.getElementById("vote");
const scoreText = document.getElementById("score");
const startScreen = document.getElementById("startScreen");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const mobileJump = document.getElementById("mobileJump");

let playerY = 0;
let velocityY = 0;
let gravity = 0.85;
let jumpPower = 18;

let obstacleX = 900;
let obstacleSpeed = 6;

let voteX = 1200;
let voteY = 180;

let score = 0;
let votes = 0;
let running = false;
let animationId;

function startGame() {
  startScreen.style.display = "none";
  gameOver.style.display = "none";
  running = true;
  resetValues();
  gameLoop();
}

function resetValues() {
  playerY = 0;
  velocityY = 0;
  obstacleX = game.clientWidth + 100;
  voteX = game.clientWidth + 450;
  voteY = 170 + Math.random() * 80;
  obstacleSpeed = 6;
  score = 0;
  votes = 0;
  updateScore();
  player.style.bottom = "92px";
}

function updateScore() {
  scoreText.textContent = `Score: ${score} | Votes: ${votes}`;
}

function jump() {
  if (!running) return;

  if (playerY === 0) {
    velocityY = jumpPower;
  }
}

function gameLoop() {
  if (!running) return;

  velocityY -= gravity;
  playerY += velocityY;

  if (playerY <= 0) {
    playerY = 0;
    velocityY = 0;
  }

  player.style.bottom = 92 + playerY + "px";

  obstacleX -= obstacleSpeed;

  if (obstacleX < -90) {
    obstacleX = game.clientWidth + Math.random() * 450;
    score++;
    obstacleSpeed += 0.25;
    updateScore();
  }

  obstacle.style.right = game.clientWidth - obstacleX + "px";

  voteX -= obstacleSpeed;

  if (voteX < -70) {
    voteX = game.clientWidth + 600 + Math.random() * 500;
    voteY = 160 + Math.random() * 90;
  }

  vote.style.right = game.clientWidth - voteX + "px";
  vote.style.bottom = voteY + "px";

  checkCollision();
  checkVoteCollection();

  animationId = requestAnimationFrame(gameLoop);
}

function checkCollision() {
  const playerRect = player.getBoundingClientRect();
  const obstacleRect = obstacle.getBoundingClientRect();

  const hit =
    playerRect.left < obstacleRect.right &&
    playerRect.right > obstacleRect.left &&
    playerRect.top < obstacleRect.bottom &&
    playerRect.bottom > obstacleRect.top;

  if (hit) {
    endGame();
  }
}

function checkVoteCollection() {
  const playerRect = player.getBoundingClientRect();
  const voteRect = vote.getBoundingClientRect();

  const collected =
    playerRect.left < voteRect.right &&
    playerRect.right > voteRect.left &&
    playerRect.top < voteRect.bottom &&
    playerRect.bottom > voteRect.top;

  if (collected) {
    votes++;
    score += 2;
    voteX = game.clientWidth + 600 + Math.random() * 500;
    updateScore();
  }
}

function endGame() {
  running = false;
  cancelAnimationFrame(animationId);
  finalScore.textContent = `Score: ${score} | Votes: ${votes}`;
  gameOver.style.display = "flex";
}

function restartGame() {
  startGame();
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }
});

game.addEventListener("click", function(e) {
  if (!e.target.closest("button")) {
    jump();
  }
});

mobileJump.addEventListener("click", jump);
</script>

</body>
</html>
