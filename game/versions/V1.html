<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jump Runner Game</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(#7fd7ff, #dff7ff);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game {
      width: 900px;
      max-width: 95vw;
      height: 420px;
      background: linear-gradient(#74d8ff 0 65%, #7ad15f 65% 100%);
      border: 5px solid #222;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.9;
      animation: cloudMove 18s linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud.one {
      width: 100px;
      height: 35px;
      top: 60px;
      left: 900px;
    }

    .cloud.one::before {
      width: 45px;
      height: 45px;
      left: 15px;
      top: -18px;
    }

    .cloud.one::after {
      width: 55px;
      height: 55px;
      right: 10px;
      top: -25px;
    }

    .cloud.two {
      width: 130px;
      height: 40px;
      top: 120px;
      left: 1100px;
      animation-delay: 4s;
    }

    .cloud.two::before {
      width: 55px;
      height: 55px;
      left: 20px;
      top: -22px;
    }

    .cloud.two::after {
      width: 65px;
      height: 65px;
      right: 18px;
      top: -30px;
    }

    @keyframes cloudMove {
      from { transform: translateX(0); }
      to { transform: translateX(-1200px); }
    }

    .score {
      position: absolute;
      top: 18px;
      right: 22px;
      font-size: 24px;
      font-weight: 800;
      color: #222;
      z-index: 10;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 90px;
      background:
        linear-gradient(#8b5a2b 0 28%, #5d3518 28% 100%);
      border-top: 5px solid #2c8b34;
    }

    .ground::after {
      content: "";
      position: absolute;
      inset: 25px 0 0;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.12) 25%, transparent 25%);
      background-size: 40px 40px;
    }

    .player {
      position: absolute;
      left: 90px;
      bottom: 90px;
      width: 46px;
      height: 60px;
      background: #e53935;
      border: 3px solid #111;
      border-radius: 12px 12px 8px 8px;
      z-index: 5;
    }

    .player::before {
      content: "";
      position: absolute;
      width: 54px;
      height: 18px;
      background: #d32f2f;
      border: 3px solid #111;
      border-radius: 18px 18px 6px 6px;
      top: -18px;
      left: -7px;
    }

    .player::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      background: #ffd29c;
      border: 2px solid #111;
      border-radius: 50%;
      top: 10px;
      right: 6px;
    }

    .legs {
      position: absolute;
      bottom: -17px;
      left: 6px;
      width: 34px;
      height: 18px;
      display: flex;
      gap: 6px;
    }

    .legs div {
      width: 14px;
      height: 18px;
      background: #2f55d4;
      border: 2px solid #111;
      border-radius: 0 0 6px 6px;
    }

    .obstacle {
      position: absolute;
      bottom: 90px;
      right: -60px;
      width: 42px;
      height: 48px;
      background: #8b3f1f;
      border: 3px solid #111;
      border-radius: 8px;
      z-index: 4;
    }

    .obstacle::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border: 2px solid #111;
      border-radius: 50%;
      top: 7px;
      left: 8px;
    }

    .obstacle::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
      top: 13px;
      left: 14px;
    }

    .start-screen,
    .game-over {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20;
      color: white;
      text-align: center;
    }

    .game-over {
      display: none;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      color: #222;
      padding: 28px 34px;
      border-radius: 18px;
      border: 4px solid #222;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .panel p {
      margin: 8px 0 18px;
      font-size: 17px;
    }

    .panel button {
      border: none;
      background: #ffcc00;
      border: 3px solid #222;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .panel button:hover {
      transform: scale(1.05);
    }

    .mobile-jump {
      display: none;
      position: absolute;
      bottom: 110px;
      right: 18px;
      z-index: 15;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 3px solid #222;
      background: rgba(255, 204, 0, 0.85);
      font-size: 28px;
      font-weight: 900;
    }

    @media (max-width: 650px) {
      .game {
        height: 360px;
      }

      .mobile-jump {
        display: block;
      }

      .score {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="game" id="game">
    <div class="score" id="score">Score: 0</div>

    <div class="cloud one"></div>
    <div class="cloud two"></div>

    <div class="player" id="player">
      <div class="legs">
        <div></div>
        <div></div>
      </div>
    </div>

    <div class="obstacle" id="obstacle"></div>
    <div class="ground"></div>

    <button class="mobile-jump" id="mobileJump">↑</button>

    <div class="start-screen" id="startScreen">
      <div class="panel">
        <h1>Jump Runner</h1>
        <p>Press Space, ↑, or tap to jump.</p>
        <button onclick="startGame()">Start Game</button>
      </div>
    </div>

    <div class="game-over" id="gameOver">
      <div class="panel">
        <h1>Game Over</h1>
        <p id="finalScore">Score: 0</p>
        <button onclick="restartGame()">Restart</button>
      </div>
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const scoreText = document.getElementById("score");
    const startScreen = document.getElementById("startScreen");
    const gameOver = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");
    const mobileJump = document.getElementById("mobileJump");

    let playerY = 0;
    let velocityY = 0;
    let gravity = 0.85;
    let jumpPower = 17;

    let obstacleX = 900;
    let obstacleSpeed = 6;

    let score = 0;
    let running = false;
    let animationId;

    function startGame() {
      startScreen.style.display = "none";
      running = true;
      resetValues();
      gameLoop();
    }

    function resetValues() {
      playerY = 0;
      velocityY = 0;
      obstacleX = game.clientWidth + 100;
      obstacleSpeed = 6;
      score = 0;
      scoreText.textContent = "Score: 0";
      obstacle.style.right = "-60px";
      player.style.bottom = "90px";
    }

    function jump() {
      if (!running) return;

      if (playerY === 0) {
        velocityY = jumpPower;
      }
    }

    function gameLoop() {
      if (!running) return;

      velocityY -= gravity;
      playerY += velocityY;

      if (playerY <= 0) {
        playerY = 0;
        velocityY = 0;
      }

      player.style.bottom = 90 + playerY + "px";

      obstacleX -= obstacleSpeed;

      if (obstacleX < -80) {
        obstacleX = game.clientWidth + Math.random() * 400;
        score++;
        obstacleSpeed += 0.25;
        scoreText.textContent = "Score: " + score;
      }

      obstacle.style.right = game.clientWidth - obstacleX + "px";

      checkCollision();

      animationId = requestAnimationFrame(gameLoop);
    }

    function checkCollision() {
      const playerRect = player.getBoundingClientRect();
      const obstacleRect = obstacle.getBoundingClientRect();

      const hit =
        playerRect.left < obstacleRect.right &&
        playerRect.right > obstacleRect.left &&
        playerRect.top < obstacleRect.bottom &&
        playerRect.bottom > obstacleRect.top;

      if (hit) {
        endGame();
      }
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(animationId);
      finalScore.textContent = "Score: " + score;
      gameOver.style.display = "flex";
    }

    function restartGame() {
      gameOver.style.display = "none";
      running = true;
      resetValues();
      gameLoop();
    }

    document.addEventListener("keydown", function(e) {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }
    });

    game.addEventListener("click", function(e) {
      if (!e.target.closest("button")) {
        jump();
      }
    });

    mobileJump.addEventListener("click", jump);
  </script>

</body>
</html>
