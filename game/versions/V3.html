<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mass Runner</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  margin: 0;
  min-height: 100vh;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
}

.game {
  width: 950px;
  max-width: 96vw;
  height: 450px;
  position: relative;
  overflow: hidden;
  border: 5px solid #111;
  border-radius: 18px;
  background: linear-gradient(#7ddcff 0 60%, #4caf50 60% 100%);
}

.title, .score {
  position: absolute;
  top: 15px;
  z-index: 20;
  font-weight: 900;
  font-size: 22px;
}

.title { left: 20px; }
.score { right: 20px; }

.sun {
  position: absolute;
  top: 55px;
  right: 120px;
  width: 70px;
  height: 70px;
  background: #ffd54f;
  border-radius: 50%;
}

.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 90px;
  background: linear-gradient(#8b5a2b 0 30%, #5d3518 30%);
  border-top: 5px solid #198c30;
}

/* Player */
.player {
  position: absolute;
  left: 90px;
  bottom: 90px;
  width: 68px;
  height: 115px;
  z-index: 10;
}

.head {
  position: absolute;
  top: 0;
  left: 18px;
  width: 34px;
  height: 36px;
  background: #c88755;
  border: 3px solid #111;
  border-radius: 50%;
}

.hair {
  position: absolute;
  top: -3px;
  left: 12px;
  width: 46px;
  height: 22px;
  background: #111;
  border-radius: 60% 60% 35% 35%;
  z-index: 2;
}

.glasses {
  position: absolute;
  top: 14px;
  left: 21px;
  width: 28px;
  height: 8px;
  z-index: 3;
}

.glasses::before,
.glasses::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 8px;
  background: #111;
  border-radius: 4px;
}

.glasses::before { left: 0; }
.glasses::after { right: 0; }

.mustache {
  position: absolute;
  top: 26px;
  left: 27px;
  width: 15px;
  height: 4px;
  background: #111;
  border-radius: 50%;
  z-index: 4;
}

.suit-body {
  position: absolute;
  top: 36px;
  left: 10px;
  width: 48px;
  height: 54px;
  background: #050505;
  border: 3px solid #111;
  border-radius: 12px 12px 5px 5px;
  z-index: 2;
}

.suit-body::before {
  content: "";
  position: absolute;
  top: 4px;
  left: 15px;
  width: 14px;
  height: 40px;
  background: white;
  clip-path: polygon(0 0, 100% 0, 70% 100%, 30% 100%);
}

.suit-body::after {
  content: "";
  position: absolute;
  top: 7px;
  left: 20px;
  width: 5px;
  height: 31px;
  background: #8b1e1e;
  border-radius: 3px;
}

.arm, .leg {
  position: absolute;
  background: #050505;
  border: 3px solid #111;
  transform-origin: top center;
}

.arm {
  top: 44px;
  width: 14px;
  height: 40px;
  border-radius: 12px;
}

.arm.left { left: 0; animation: armA .28s infinite alternate; }
.arm.right { right: 0; animation: armB .28s infinite alternate; }

.leg {
  top: 88px;
  width: 17px;
  height: 34px;
  border-radius: 0 0 9px 9px;
}

.leg.left { left: 16px; animation: legA .28s infinite alternate; }
.leg.right { right: 16px; animation: legB .28s infinite alternate; }

@keyframes armA { from { transform: rotate(30deg); } to { transform: rotate(-30deg); } }
@keyframes armB { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }
@keyframes legA { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }
@keyframes legB { from { transform: rotate(25deg); } to { transform: rotate(-25deg); } }

/* Obstacles */
.obstacle {
  position: absolute;
  bottom: 90px;
  right: -100px;
  width: 78px;
  height: 78px;
  border: 4px solid #111;
  background: white;
  border-radius: 14px;
  z-index: 8;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 900;
  text-align: center;
  font-size: 13px;
}

.obstacle.symbol {
  border-radius: 50%;
  font-size: 34px;
}

.obstacle.face {
  border-radius: 50% 50% 45% 45%;
  background: #d99a6c;
  flex-direction: column;
}

.face .eyes {
  font-size: 20px;
  line-height: 12px;
}

.face .name {
  background: #111;
  color: white;
  padding: 2px 5px;
  border-radius: 6px;
  font-size: 10px;
  margin-top: 6px;
}

.vote {
  position: absolute;
  bottom: 190px;
  right: -60px;
  width: 42px;
  height: 42px;
  background: gold;
  border: 3px solid #111;
  border-radius: 50%;
  z-index: 7;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 900;
}

.screen {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 50;
}

#gameOver { display: none; }

.panel {
  background: white;
  border: 4px solid #111;
  border-radius: 18px;
  padding: 28px;
  text-align: center;
  max-width: 360px;
}

.panel h1 { margin: 0 0 10px; }

button {
  border: 3px solid #111;
  background: #ffcc00;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
}

.mobile-jump {
  display: none;
  position: absolute;
  right: 18px;
  bottom: 110px;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  z-index: 30;
}

@media(max-width:650px) {
  .game { height: 390px; }
  .mobile-jump { display: block; }
}
</style>
</head>

<body>

<div class="game" id="game">
  <div class="title">Mass Runner</div>
  <div class="score" id="score">Score: 0 | Votes: 0</div>

  <div class="sun"></div>

  <div class="player" id="player">
    <div class="head"></div>
    <div class="hair"></div>
    <div class="glasses"></div>
    <div class="mustache"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="suit-body"></div>
    <div class="leg left"></div>
    <div class="leg right"></div>
  </div>

  <div class="obstacle" id="obstacle"></div>
  <div class="vote" id="vote">V</div>
  <div class="ground"></div>

  <button class="mobile-jump" id="mobileJump">↑</button>

  <div class="screen" id="startScreen">
    <div class="panel">
      <h1>Mass Runner</h1>
      <p>Jump over political symbols and cartoon rivals. Collect votes.</p>
      <p>Press Space / ↑ / Tap</p>
      <button onclick="startGame()">Start</button>
    </div>
  </div>

  <div class="screen" id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore"></p>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const vote = document.getElementById("vote");
const scoreText = document.getElementById("score");
const startScreen = document.getElementById("startScreen");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const mobileJump = document.getElementById("mobileJump");

const obstacles = [
  { type: "symbol", icon: "🌅", label: "DMK" },
  { type: "symbol", icon: "🍃", label: "ADMK" },
  { type: "symbol", icon: "🪷", label: "BJP" },
  { type: "symbol", icon: "✋", label: "INC" },
  { type: "symbol", icon: "🐅", label: "NTK" },
  { type: "symbol", icon: "🐆", label: "VCK" },
  { type: "symbol", icon: "☪", label: "IUML" },
  { type: "symbol", icon: "☭", label: "CPI" },
  { type: "symbol", icon: "🔨", label: "CPM" },

  { type: "face", label: "Modi" },
  { type: "face", label: "Rahul" },
  { type: "face", label: "Jaya" },
  { type: "face", label: "Kalaignar" },
  { type: "face", label: "Stalin" },
  { type: "face", label: "Udhay" },
  { type: "face", label: "Seeman" },
  { type: "face", label: "EPS" }
];

let playerY = 0;
let velocityY = 0;
let gravity = 0.85;
let jumpPower = 18;

let obstacleX = 900;
let obstacleSpeed = 6;

let voteX = 1200;
let voteY = 190;

let score = 0;
let votes = 0;
let running = false;
let animationId;

function makeObstacle() {
  const item = obstacles[Math.floor(Math.random() * obstacles.length)];

  obstacle.className = "obstacle " + item.type;

  if (item.type === "symbol") {
    obstacle.innerHTML = `
      <div>
        <div>${item.icon}</div>
        <div style="font-size:11px">${item.label}</div>
      </div>
    `;
  } else {
    obstacle.innerHTML = `
      <div class="eyes">ಠ_ಠ</div>
      <div style="font-size:22px">〰</div>
      <div class="name">${item.label}</div>
    `;
  }
}

function startGame() {
  startScreen.style.display = "none";
  gameOver.style.display = "none";
  running = true;
  resetValues();
  makeObstacle();
  gameLoop();
}

function resetValues() {
  playerY = 0;
  velocityY = 0;
  obstacleX = game.clientWidth + 200;
  voteX = game.clientWidth + 500;
  obstacleSpeed = 6;
  score = 0;
  votes = 0;
  updateScore();
}

function updateScore() {
  scoreText.textContent = `Score: ${score} | Votes: ${votes}`;
}

function jump() {
  if (!running) return;

  if (playerY === 0) {
    velocityY = jumpPower;
    player.style.transform = "rotate(-4deg)";
    setTimeout(() => player.style.transform = "rotate(0deg)", 180);
  }
}

function gameLoop() {
  if (!running) return;

  velocityY -= gravity;
  playerY += velocityY;

  if (playerY <= 0) {
    playerY = 0;
    velocityY = 0;
  }

  player.style.bottom = 90 + playerY + "px";

  obstacleX -= obstacleSpeed;

  if (obstacleX < -120) {
    obstacleX = game.clientWidth + Math.random() * 450;
    score++;
    obstacleSpeed += 0.25;
    makeObstacle();
    updateScore();
  }

  obstacle.style.right = game.clientWidth - obstacleX + "px";

  voteX -= obstacleSpeed;

  if (voteX < -70) {
    voteX = game.clientWidth + 600 + Math.random() * 500;
    voteY = 160 + Math.random() * 110;
  }

  vote.style.right = game.clientWidth - voteX + "px";
  vote.style.bottom = voteY + "px";

  checkObstacleHit();
  checkVoteCollect();

  animationId = requestAnimationFrame(gameLoop);
}

function checkObstacleHit() {
  const p = player.getBoundingClientRect();
  const o = obstacle.getBoundingClientRect();

  const hit =
    p.left < o.right - 10 &&
    p.right > o.left + 10 &&
    p.top < o.bottom - 8 &&
    p.bottom > o.top + 8;

  if (hit) endGame();
}

function checkVoteCollect() {
  const p = player.getBoundingClientRect();
  const v = vote.getBoundingClientRect();

  const collected =
    p.left < v.right &&
    p.right > v.left &&
    p.top < v.bottom &&
    p.bottom > v.top;

  if (collected) {
    votes++;
    score += 2;
    voteX = game.clientWidth + 700 + Math.random() * 500;
    updateScore();
  }
}

function endGame() {
  running = false;
  cancelAnimationFrame(animationId);
  finalScore.textContent = `Score: ${score} | Votes: ${votes}`;
  gameOver.style.display = "flex";
}

function restartGame() {
  startGame();
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }
});

game.addEventListener("click", e => {
  if (!e.target.closest("button")) jump();
});

mobileJump.addEventListener("click", jump);
</script>

</body>
</html>
