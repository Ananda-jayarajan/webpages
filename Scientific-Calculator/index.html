<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <div class="mode-text">
      <span>NORM</span>
      <span>MATH</span>
      <span>DECI</span>
    </div>

    <section class="display">
      <div class="cursor"></div>
      <div id="expression" class="expression"></div>
      <div id="result" class="result">0</div>
    </section>

    <section class="top-icons">
      <button class="icon-btn menu">☰</button>
      <button class="icon-btn pro">◇ PRO</button>
      <button class="icon-btn">Σ</button>
      <button class="icon-btn">⚙</button>
      <button class="icon-btn" id="angleBtn">DEG</button>
      <button class="icon-btn scan">▣ SCAN</button>
    </section>

    <section id="keys" class="keys"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
