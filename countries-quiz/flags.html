<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flags of the World Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page">

  <!-- Ribbon -->
  <div class="ribbon">
    <div class="ribbon-title">Other Quiz</div>
    <a href="index.html">Whole Map</a>
    <a href="flags.html">Flags</a>
    <a href="europe.html">Europe</a>
    <a href="asia.html">Asia</a>
    <a href="africa.html">Africa</a>
  </div>

  <h1>Flags of the World Quiz</h1>
  <p class="subtitle">Guess the country from the flag</p>

  <div class="quiz-panel">

    <div class="quiz-top">
      <div class="timer" id="timer">10:00</div>
      <div class="score"><span id="score">0</span> / 196</div>
    </div>

    <div class="controls">
      <input id="answerInput" type="text" placeholder="Enter country name" disabled />
      <button id="startBtn">Start</button>
      <button id="giveUpBtn" disabled>Give Up</button>
    </div>

    <div id="status" class="status"></div>

    <!-- FLAG -->
    <div style="text-align:center; padding:20px;">
      <img id="flagImg" src="" style="width:220px; border:1px solid #ccc;">
    </div>

  </div>
</div>

<script src="flags.js"></script>
</body>
</html>
