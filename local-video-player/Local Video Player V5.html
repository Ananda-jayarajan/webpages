<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Video.js Inspired Player</title>

<style>
* {
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, #264653, transparent 35%),
    linear-gradient(135deg, #111, #1f2937);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

.app {
  width: 100%;
  max-width: 1200px;
}

.app.theater {
  max-width: 95vw;
}

h1, p {
  text-align: center;
}

p {
  color: #cbd5e1;
}

.player {
  position: relative;
  background: black;
  border-radius: 26px;
  overflow: hidden;
  box-shadow: 0 35px 90px rgba(0,0,0,.65);
}

video {
  width: 100%;
  display: block;
  max-height: 680px;
  background: black;
}

.big-play {
  position: absolute;
  inset: 0;
  margin: auto;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(31,49,58,.88);
  color: white;
  font-size: 38px;
  cursor: pointer;
  backdrop-filter: blur(16px);
}

.controls {
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: 18px;
  padding: 12px 16px;
  border-radius: 999px;
  background: rgba(31,49,58,.92);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 14px 45px rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  gap: 13px;
  transition: .25s;
}

.player.hide .controls {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

button {
  border: 0;
  background: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.13);
}

.time {
  font-size: 14px;
  white-space: nowrap;
}

.progress-box {
  position: relative;
  flex: 1;
  height: 22px;
  display: flex;
  align-items: center;
}

.progress-track {
  width: 100%;
  height: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,.25);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, white, #7dd3fc);
}

.progress {
  position: absolute;
  width: 100%;
  opacity: 0;
  cursor: pointer;
}

.preview {
  position: absolute;
  bottom: 28px;
  transform: translateX(-50%);
  background: rgba(0,0,0,.85);
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 12px;
  display: none;
  pointer-events: none;
}

.volume {
  width: 78px;
  accent-color: white;
}

.settings-wrap {
  position: relative;
}

.menu {
  position: absolute;
  right: 0;
  bottom: 42px;
  width: 180px;
  background: rgba(20, 29, 35, .96);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 16px;
  padding: 10px;
  display: none;
}

.menu.show {
  display: block;
}

.menu button {
  width: 100%;
  text-align: left;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

.menu button:hover {
  background: rgba(255,255,255,.12);
  transform: none;
}

.upload {
  margin-top: 22px;
  padding: 24px;
  border-radius: 22px;
  border: 2px dashed rgba(255,255,255,.25);
  text-align: center;
  background: rgba(255,255,255,.05);
}

.upload.drag {
  border-color: #7dd3fc;
}

.upload-btn {
  background: white;
  color: #111;
  padding: 13px 24px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: bold;
  display: inline-block;
}

input[type=file] {
  display: none;
}

.filename {
  margin-top: 12px;
  color: #cbd5e1;
}

@media(max-width: 760px) {
  .controls {
    border-radius: 22px;
    flex-wrap: wrap;
  }

  .progress-box {
    order: -1;
    width: 100%;
    flex: auto;
  }
}
</style>
</head>

<body>

<div class="app" id="app">
  <h1>Offline Web Player</h1>
  <p>Modern Video.js v10-inspired local video player</p>

  <div class="player" id="player">
    <video id="video"></video>

    <button class="big-play" id="bigPlay">▶</button>

    <div class="controls">
      <button id="play">▶</button>
      <button id="back">↺10</button>
      <button id="forward">10↻</button>

      <span class="time" id="current">0:00</span>

      <div class="progress-box" id="progressBox">
        <div class="preview" id="preview">0:00</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <input class="progress" id="progress" type="range" min="0" max="100" value="0">
      </div>

      <span class="time" id="duration">0:00</span>

      <button id="mute">🔊</button>
      <input class="volume" id="volume" type="range" min="0" max="1" step=".01" value="1">

      <button id="pip">▣</button>
      <button id="theater">▭</button>
      <button id="full">⛶</button>

      <div class="settings-wrap">
        <button id="settings">⚙</button>
        <div class="menu" id="menu">
          <button data-speed="0.5">Speed 0.5x</button>
          <button data-speed="1">Speed 1x ✓</button>
          <button data-speed="1.25">Speed 1.25x</button>
          <button data-speed="1.5">Speed 1.5x</button>
          <button data-speed="2">Speed 2x</button>
          <button id="loopBtn">Loop: Off</button>
        </div>
      </div>
    </div>
  </div>

  <div class="upload" id="dropArea">
    <label class="upload-btn" for="fileInput">Choose Local Video</label>
    <input type="file" id="fileInput" accept="video/*">
    <div class="filename" id="filename">Or drag and drop a video here</div>
  </div>
</div>

<script>
const app = document.getElementById("app");
const video = document.getElementById("video");
const player = document.getElementById("player");
const fileInput = document.getElementById("fileInput");
const filename = document.getElementById("filename");

const play = document.getElementById("play");
const bigPlay = document.getElementById("bigPlay");
const back = document.getElementById("back");
const forward = document.getElementById("forward");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const progress = document.getElementById("progress");
const progressFill = document.getElementById("progressFill");
const progressBox = document.getElementById("progressBox");
const preview = document.getElementById("preview");
const mute = document.getElementById("mute");
const volume = document.getElementById("volume");
const pip = document.getElementById("pip");
const full = document.getElementById("full");
const theater = document.getElementById("theater");
const settings = document.getElementById("settings");
const menu = document.getElementById("menu");
const loopBtn = document.getElementById("loopBtn");
const dropArea = document.getElementById("dropArea");

let hideTimer;

function loadVideo(file) {
  if (!file) return;
  video.src = URL.createObjectURL(file);
  filename.textContent = "Now playing: " + file.name;
  video.play();
}

fileInput.addEventListener("change", () => loadVideo(fileInput.files[0]));

dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.classList.add("drag");
});

dropArea.addEventListener("dragleave", () => {
  dropArea.classList.remove("drag");
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  dropArea.classList.remove("drag");
  loadVideo(e.dataTransfer.files[0]);
});

function togglePlay() {
  if (!video.src) return;
  video.paused ? video.play() : video.pause();
}

play.onclick = togglePlay;
bigPlay.onclick = togglePlay;
video.onclick = togglePlay;

video.onplay = () => {
  play.textContent = "❚❚";
  bigPlay.style.display = "none";
};

video.onpause = () => {
  play.textContent = "▶";
  bigPlay.style.display = "block";
};

back.onclick = () => video.currentTime -= 10;
forward.onclick = () => video.currentTime += 10;

video.onloadedmetadata = () => {
  duration.textContent = format(video.duration);
};

video.ontimeupdate = () => {
  const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
  progress.value = pct;
  progressFill.style.width = pct + "%";
  current.textContent = format(video.currentTime);
};

progress.oninput = () => {
  video.currentTime = (progress.value / 100) * video.duration;
};

progressBox.addEventListener("mousemove", e => {
  if (!video.duration) return;

  const rect = progressBox.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = Math.min(Math.max(x / rect.width, 0), 1);

  preview.style.left = x + "px";
  preview.textContent = format(pct * video.duration);
  preview.style.display = "block";
});

progressBox.addEventListener("mouseleave", () => {
  preview.style.display = "none";
});

volume.oninput = () => {
  video.volume = volume.value;
  video.muted = false;
  mute.textContent = "🔊";
};

mute.onclick = () => {
  video.muted = !video.muted;
  mute.textContent = video.muted ? "🔇" : "🔊";
};

settings.onclick = () => {
  menu.classList.toggle("show");
};

menu.querySelectorAll("[data-speed]").forEach(btn => {
  btn.onclick = () => {
    video.playbackRate = Number(btn.dataset.speed);

    menu.querySelectorAll("[data-speed]").forEach(b => {
      b.textContent = "Speed " + b.dataset.speed + "x";
    });

    btn.textContent = "Speed " + btn.dataset.speed + "x ✓";
  };
});

loopBtn.onclick = () => {
  video.loop = !video.loop;
  loopBtn.textContent = "Loop: " + (video.loop ? "On" : "Off");
};

pip.onclick = async () => {
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture();
  } else if (document.pictureInPictureEnabled) {
    await video.requestPictureInPicture();
  }
};

full.onclick = () => {
  document.fullscreenElement ? document.exitFullscreen() : player.requestFullscreen();
};

theater.onclick = () => {
  app.classList.toggle("theater");
};

function format(sec) {
  if (isNaN(sec)) return "0:00";
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return h > 0 ? `${h}:${m.toString().padStart(2,"0")}:${s}` : `${m}:${s}`;
}

function showControls() {
  player.classList.remove("hide");
  clearTimeout(hideTimer);

  hideTimer = setTimeout(() => {
    if (!video.paused) player.classList.add("hide");
  }, 2500);
}

player.addEventListener("mousemove", showControls);
player.addEventListener("touchstart", showControls);

document.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    togglePlay();
  }

  if (e.code === "ArrowRight") video.currentTime += 10;
  if (e.code === "ArrowLeft") video.currentTime -= 10;
  if (e.key.toLowerCase() === "m") mute.click();
  if (e.key.toLowerCase() === "f") full.click();
  if (e.key.toLowerCase() === "t") theater.click();
});
</script>


  <div class="version-switcher">
  <button class="version-btn">Switch ▾</button>
  <div class="version-menu">
    <a href="Local%20Video%20Player%20V1.html">V1</a>
    <a href="Local%20Video%20Player%20V2.html">V2</a>
    <a href="Local%20Video%20Player%20V3.html">V3</a>
    <a href="Local%20Video%20Player%20V4.html">V4</a>
    <a href="Local%20Video%20Player%20V5.html">V5</a>
  </div>
</div>

<style>
.version-switcher {
  position: fixed;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 9999;
  font-family: Segoe UI, Arial, sans-serif;
}

.version-btn {
  width: 82px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.35);
  background: linear-gradient(
    rgba(255,255,255,0.35),
    rgba(120,170,220,0.18)
  );
  color: white;
  backdrop-filter: blur(10px);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.55),
    0 6px 18px rgba(0,0,0,0.35);
  cursor: pointer;
}

.version-menu {
  display: none;
  margin-top: 8px;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(20, 30, 45, 0.62);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 8px 22px rgba(0,0,0,0.4);
}

.version-menu a {
  display: block;
  padding: 10px 22px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.version-menu a:hover {
  background: rgba(120, 180, 255, 0.35);
}

.version-switcher:hover .version-menu {
  display: block;
}
</style>
</body>
</html>
