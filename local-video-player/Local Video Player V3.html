<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Video Player</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
      letter-spacing: 1px;
    }

    p {
      color: #d1d5db;
      margin-bottom: 25px;
    }

    .upload-label {
      display: inline-block;
      padding: 14px 24px;
      background: #3b82f6;
      color: white;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      margin-bottom: 25px;
    }

    .upload-label:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    input[type="file"] {
      display: none;
    }

    video {
      width: 100%;
      max-height: 500px;
      border-radius: 18px;
      background: black;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
      outline: none;
    }

    .filename {
      margin-top: 15px;
      color: #e5e7eb;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Local Video Player</h1>
    <p>Select a video from your computer and play it instantly.</p>

    <label class="upload-label" for="videoInput">
      Choose Video
    </label>

    <input type="file" id="videoInput" accept="video/*" />

    <video id="videoPlayer" controls></video>

    <div class="filename" id="fileName">No video selected</div>
  </div>

  <script>
    const input = document.getElementById("videoInput");
    const video = document.getElementById("videoPlayer");
    const fileName = document.getElementById("fileName");

    input.addEventListener("change", function () {
      const file = this.files[0];

      if (file) {
        const videoURL = URL.createObjectURL(file);
        video.src = videoURL;
        video.play();
        fileName.textContent = "Now playing: " + file.name;
      }
    });
  </script>

  <div class="version-switcher">
  <button class="version-btn">Switch ▾</button>
  <div class="version-menu">
    <a href="Local%20Video%20Player%20V1.html">V1</a>
    <a href="Local%20Video%20Player%20V2.html">V2</a>
    <a href="Local%20Video%20Player%20V3.html">V3</a>
    <a href="Local%20Video%20Player%20V4.html">V4</a>
    <a href="Local%20Video%20Player%20V5.html">V5</a>
  </div>
</div>

<style>
.version-switcher {
  position: fixed;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 9999;
  font-family: Segoe UI, Arial, sans-serif;
}

.version-btn {
  width: 82px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.35);
  background: linear-gradient(
    rgba(255,255,255,0.35),
    rgba(120,170,220,0.18)
  );
  color: white;
  backdrop-filter: blur(10px);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.55),
    0 6px 18px rgba(0,0,0,0.35);
  cursor: pointer;
}

.version-menu {
  display: none;
  margin-top: 8px;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(20, 30, 45, 0.62);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 8px 22px rgba(0,0,0,0.4);
}

.version-menu a {
  display: block;
  padding: 10px 22px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.version-menu a:hover {
  background: rgba(120, 180, 255, 0.35);
}

.version-switcher:hover .version-menu {
  display: block;
}
</style>
</body>
</html>
