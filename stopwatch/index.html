<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #121016;
      color: #eee8f0;
      display: flex;
      justify-content: center;
    }

    /* Page Switcher */
    .page-switcher {
      position: fixed;
      top: 26px;
      right: 26px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      background: rgba(33, 27, 37, 0.95);
      padding: 8px;
      border-radius: 20px;
      border: 1px solid #2e2633;
    }

    .switcher-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      background: transparent;
      color: #cfc6d5;
    }

    .switcher-btn.active {
      background: #764248;
      color: #fff7f7;
    }

    .switcher-btn:hover {
      background: rgba(118, 66, 72, 0.6);
      color: #fff7f7;
    }

    /* Page Container */
    .page {
      display: none;
      width: 100%;
      min-height: 100vh;
    }

    .page.active {
      display: flex;
    }

    /* ===== VERSION 1 STYLES ===== */
    .page-v1 {
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 36px 26px 0;
      position: relative;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 65px;
    }

    .top h1 {
      font-size: 34px;
      font-weight: 400;
      margin: 0;
    }

    .menu {
      font-size: 34px;
      color: #cfc6d5;
    }

    .time {
      text-align: center;
      font-size: 82px;
      font-weight: 300;
      letter-spacing: -4px;
      color: #d8ccd9;
      margin-bottom: 320px;
    }

    .start-btn {
      width: 100%;
      height: 132px;
      border: none;
      border-radius: 80px;
      background: #764248;
      color: #fff7f7;
      font-size: 30px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .start-btn:hover {
      transform: scale(1.02);
      background: #875057;
    }

    .start-btn.running {
      background: #4f3340;
    }

    .controls {
      display: none;
      gap: 16px;
    }

    .controls.show {
      display: flex;
    }

    .small-btn {
      flex: 1;
      height: 95px;
      border: none;
      border-radius: 60px;
      font-size: 24px;
      cursor: pointer;
      color: white;
    }

    .reset {
      background: #332b37;
    }

    .pause {
      background: #764248;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 95px;
      background: #211b25;
      display: flex;
      justify-content: space-around;
      align-items: center;
      color: #cfc6d5;
      border-top: 1px solid #2e2633;
    }

    .nav-item {
      text-align: center;
      font-size: 13px;
      opacity: 0.7;
    }

    .nav-item span {
      display: block;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .nav-item.active {
      opacity: 1;
      color: #f1dff5;
      background: #5e4a70;
      padding: 8px 14px;
      border-radius: 28px;
    }

    /* ===== VERSION 2 STYLES ===== */
    .page-v2 {
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #1a1625 0%, #2d1f35 100%);
      transition: background 0.5s ease;
    }

    .v2-top-controls {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .v2-title {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 1px;
      color: #b89fbe;
    }

    .theme-selector {
      display: flex;
      gap: 8px;
    }

    .theme-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      opacity: 0.6;
    }

    .theme-dot:hover {
      opacity: 1;
    }

    .theme-dot.active {
      border-color: #f1dff5;
      opacity: 1;
    }

    .v2-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 30px;
      text-align: center;
    }

    .v2-quote {
      font-size: 16px;
      color: #b89fbe;
      margin-bottom: 60px;
      font-style: italic;
      letter-spacing: 0.3px;
      line-height: 1.6;
      min-height: 50px;
    }

    .v2-display-section {
      margin-bottom: 80px;
    }

    .v2-main-time {
      font-size: 140px;
      font-weight: 200;
      letter-spacing: -8px;
      color: #ffffff;
      line-height: 0.9;
      margin: 0;
      font-family: 'Courier New', monospace;
    }

    .v2-subsecond {
      font-size: 60px;
      color: #b89fbe;
      margin-top: 10px;
      letter-spacing: -2px;
      font-family: 'Courier New', monospace;
    }

    .v2-mode-display {
      font-size: 13px;
      color: #8b7598;
      letter-spacing: 2px;
      margin-top: 20px;
      text-transform: uppercase;
    }

    .v2-button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .v2-main-btn {
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #d8859f 0%, #c46d7f 100%);
      color: #ffffff;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.4s ease;
      letter-spacing: 1px;
      box-shadow: 0 8px 25px rgba(118, 66, 72, 0.3);
    }

    .v2-main-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(118, 66, 72, 0.5);
    }

    .v2-main-btn:active {
      transform: translateY(-1px);
    }

    .v2-secondary-btn {
      padding: 14px 32px;
      border: 2px solid #b89fbe;
      border-radius: 50px;
      background: transparent;
      color: #b89fbe;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .v2-secondary-btn:hover {
      background: rgba(184, 159, 190, 0.1);
      color: #f1dff5;
      border-color: #f1dff5;
    }

    .v2-secondary-btn.hidden {
      display: none;
    }

    .v2-controls-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .v2-icon-btn {
      width: 56px;
      height: 56px;
      border: 2px solid #b89fbe;
      border-radius: 50%;
      background: transparent;
      color: #b89fbe;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .v2-icon-btn:hover {
      background: rgba(184, 159, 190, 0.1);
      color: #f1dff5;
      border-color: #f1dff5;
    }

    .v2-laps {
      width: 100%;
      max-width: 400px;
      margin-top: 40px;
    }

    .v2-laps-title {
      font-size: 13px;
      letter-spacing: 2px;
      color: #8b7598;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .v2-lap-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(184, 159, 190, 0.2);
      color: #b89fbe;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }

    .v2-lap-item:last-child {
      border-bottom: none;
    }

    .v2-lap-number {
      color: #8b7598;
      min-width: 60px;
      text-align: left;
    }

    .v2-lap-time {
      color: #f1dff5;
      min-width: 100px;
      text-align: right;
    }

    /* Theme Backgrounds */
    .v2-theme-1 {
      background: linear-gradient(135deg, #1a1625 0%, #2d1f35 100%);
    }

    .v2-theme-2 {
      background: linear-gradient(135deg, #2a1f2e 0%, #1f2a28 100%);
    }

    .v2-theme-3 {
      background: linear-gradient(135deg, #2d1a1f 0%, #2d2529 100%);
    }

    .v2-theme-4 {
      background: linear-gradient(135deg, #0f0f15 0%, #1a1525 100%);
    }

    .v2-theme-5 {
      background: linear-gradient(135deg, #1f1a28 0%, #2a1f32 100%);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .v2-main-time {
        font-size: 100px;
      }

      .v2-subsecond {
        font-size: 45px;
      }

      .v2-container {
        padding: 30px 20px;
      }

      .v2-quote {
        font-size: 14px;
        margin-bottom: 40px;
      }

      .v2-display-section {
        margin-bottom: 50px;
      }

      .v2-main-btn {
        padding: 14px 40px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- Page Switcher -->
  <div class="page-switcher">
    <button class="switcher-btn active" data-version="v1">V1</button>
    <button class="switcher-btn" data-version="v2">V2</button>
  </div>

  <!-- VERSION 1 -->
  <div class="page page-v1 active" id="page-v1">
    <div class="phone">
      <div class="top">
        <h1>Stopwatch</h1>
        <div class="menu">⋮</div>
      </div>

      <div class="time" id="display-v1">00:00.00</div>

      <button class="start-btn" id="startBtn-v1">Start</button>

      <div class="controls" id="controls-v1">
        <button class="small-btn reset" id="resetBtn-v1">Reset</button>
        <button class="small-btn pause" id="pauseBtn-v1">Pause</button>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item">
        <span>⏰</span>
        Alarms
      </div>
      <div class="nav-item">
        <span>🌐</span>
        World clock
      </div>
      <div class="nav-item">
        <span>⌛</span>
        Timers
      </div>
      <div class="nav-item active">
        <span>⏱</span>
        Stopwatch
      </div>
      <div class="nav-item">
        <span>🛏</span>
        Bedtime
      </div>
    </div>
  </div>

  <!-- VERSION 2 -->
  <div class="page page-v2 v2-theme-1" id="page-v2">
    <div class="v2-top-controls">
      <div class="v2-title">FOCUS</div>
      <div class="theme-selector" id="themeSelector">
        <div class="theme-dot active" data-theme="1" style="background: #d8859f;"></div>
        <div class="theme-dot" data-theme="2" style="background: #7fb97f;"></div>
        <div class="theme-dot" data-theme="3" style="background: #b89f8f;"></div>
        <div class="theme-dot" data-theme="4" style="background: #8f9fb8;"></div>
        <div class="theme-dot" data-theme="5" style="background: #b88fb9;"></div>
      </div>
    </div>

    <div class="v2-container">
      <div class="v2-quote" id="quoteDisplay">
        "The only way to do great work is to love what you do." — Steve Jobs
      </div>

      <div class="v2-display-section">
        <div class="v2-main-time" id="display-v2">00:00</div>
        <div class="v2-subsecond" id="subsecond-v2">.00</div>
        <div class="v2-mode-display" id="modeDisplay">STOPWATCH</div>
      </div>

      <div class="v2-button-group">
        <button class="v2-main-btn" id="startBtn-v2">START</button>
        <button class="v2-secondary-btn hidden" id="pauseBtn-v2">PAUSE</button>
      </div>

      <div class="v2-controls-row">
        <button class="v2-icon-btn" id="lapBtn-v2" title="Record Lap">⏱</button>
        <button class="v2-icon-btn" id="resetBtn-v2" title="Reset">↻</button>
      </div>

      <div class="v2-laps">
        <div class="v2-laps-title" id="lapsTitle" style="display: none;">LAPS</div>
        <div id="lapsList"></div>
      </div>
    </div>
  </div>

  <script>
    const quotes = [
      "\"The only way to do great work is to love what you do.\" — Steve Jobs",
      "\"Success is not final, failure is not fatal.\" — Winston Churchill",
      "\"Believe you can and you're halfway there.\" — Theodore Roosevelt",
      "\"The future belongs to those who believe in the beauty of their dreams.\" — Eleanor Roosevelt",
      "\"It does not matter how slowly you go as long as you do not stop.\" — Confucius",
      "\"Everything you want is on the other side of fear.\" — George Addair",
      "\"Believe in yourself. You are braver than you think, more talented than you know, and capable of more than you imagine.\" — Roy T. Bennett",
      "\"I learned that courage was not the absence of fear, but the triumph over it.\" — Nelson Mandela"
    ];

    // ===== PAGE SWITCHER =====
    document.querySelectorAll('.switcher-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const version = e.target.dataset.version;
        
        document.querySelectorAll('.switcher-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${version}`).classList.add('active');
      });
    });

    // ===== THEME SELECTOR =====
    document.querySelectorAll('.theme-dot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        const theme = e.target.dataset.theme;
        const pageV2 = document.getElementById('page-v2');
        
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        e.target.classList.add('active');
        
        pageV2.className = `page page-v2 v2-theme-${theme}`;
      });
    });

    // ===== RANDOM QUOTE =====
    function updateQuote() {
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('quoteDisplay').textContent = randomQuote;
    }

    // Update quote on page load and every 30 seconds during focus
    updateQuote();

    // ===== VERSION 1 STOPWATCH =====
    const display_v1 = document.getElementById("display-v1");
    const startBtn_v1 = document.getElementById("startBtn-v1");
    const controls_v1 = document.getElementById("controls-v1");
    const resetBtn_v1 = document.getElementById("resetBtn-v1");
    const pauseBtn_v1 = document.getElementById("pauseBtn-v1");

    let startTime_v1 = 0;
    let elapsedTime_v1 = 0;
    let timer_v1 = null;
    let running_v1 = false;

    function formatTime(ms) {
      const totalCentiseconds = Math.floor(ms / 10);
      const centiseconds = totalCentiseconds % 100;
      const totalSeconds = Math.floor(totalCentiseconds / 100);
      const seconds = totalSeconds % 60;
      const minutes = Math.floor(totalSeconds / 60);

      return (
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0") + "." +
        String(centiseconds).padStart(2, "0")
      );
    }

    function updateDisplay_v1() {
      const currentTime = Date.now();
      elapsedTime_v1 = currentTime - startTime_v1;
      display_v1.textContent = formatTime(elapsedTime_v1);
    }

    function startTimer_v1() {
      startTime_v1 = Date.now() - elapsedTime_v1;
      timer_v1 = setInterval(updateDisplay_v1, 10);
      running_v1 = true;

      startBtn_v1.style.display = "none";
      controls_v1.classList.add("show");
    }

    function pauseTimer_v1() {
      clearInterval(timer_v1);
      running_v1 = false;
      pauseBtn_v1.textContent = "Resume";
    }

    function resumeTimer_v1() {
      startTime_v1 = Date.now() - elapsedTime_v1;
      timer_v1 = setInterval(updateDisplay_v1, 10);
      running_v1 = true;
      pauseBtn_v1.textContent = "Pause";
    }

    function resetTimer_v1() {
      clearInterval(timer_v1);
      elapsedTime_v1 = 0;
      running_v1 = false;
      display_v1.textContent = "00:00.00";

      startBtn_v1.style.display = "block";
      controls_v1.classList.remove("show");
      pauseBtn_v1.textContent = "Pause";
    }

    startBtn_v1.addEventListener("click", startTimer_v1);
    pauseBtn_v1.addEventListener("click", () => {
      running_v1 ? pauseTimer_v1() : resumeTimer_v1();
    });
    resetBtn_v1.addEventListener("click", resetTimer_v1);

    // ===== VERSION 2 AESTHETIC STOPWATCH =====
    const display_v2 = document.getElementById("display-v2");
    const subsecond_v2 = document.getElementById("subsecond-v2");
    const startBtn_v2 = document.getElementById("startBtn-v2");
    const pauseBtn_v2 = document.getElementById("pauseBtn-v2");
    const lapBtn_v2 = document.getElementById("lapBtn-v2");
    const resetBtn_v2 = document.getElementById("resetBtn-v2");
    const lapsList = document.getElementById("lapsList");
    const lapsTitle = document.getElementById("lapsTitle");

    let startTime_v2 = 0;
    let elapsedTime_v2 = 0;
    let timer_v2 = null;
    let running_v2 = false;
    let laps_v2 = [];
    let lastLapTime_v2 = 0;

    function formatTimeV2(ms) {
      const totalCentiseconds = Math.floor(ms / 10);
      const centiseconds = totalCentiseconds % 100;
      const totalSeconds = Math.floor(totalCentiseconds / 100);
      const seconds = totalSeconds % 60;
      const minutes = Math.floor(totalSeconds / 60);
      const hours = Math.floor(minutes / 60);

      if (hours > 0) {
        return String(hours).padStart(2, "0") + ":" + String(minutes % 60).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function formatCentiseconds(ms) {
      const totalCentiseconds = Math.floor(ms / 10);
      const centiseconds = totalCentiseconds % 100;
      return String(centiseconds).padStart(2, "0");
    }

    function updateDisplay_v2() {
      const currentTime = Date.now();
      elapsedTime_v2 = currentTime - startTime_v2;
      display_v2.textContent = formatTimeV2(elapsedTime_v2);
      subsecond_v2.textContent = "." + formatCentiseconds(elapsedTime_v2);
    }

    function startTimer_v2() {
      startTime_v2 = Date.now() - elapsedTime_v2;
      timer_v2 = setInterval(updateDisplay_v2, 10);
      running_v2 = true;

      startBtn_v2.classList.add('hidden');
      pauseBtn_v2.classList.remove('hidden');
      lapBtn_v2.style.opacity = '1';
      lapBtn_v2.style.pointerEvents = 'auto';
    }

    function pauseTimer_v2() {
      clearInterval(timer_v2);
      running_v2 = false;
      pauseBtn_v2.textContent = "RESUME";
    }

    function resumeTimer_v2() {
      startTime_v2 = Date.now() - elapsedTime_v2;
      timer_v2 = setInterval(updateDisplay_v2, 10);
      running_v2 = true;
      pauseBtn_v2.textContent = "PAUSE";
    }

    function recordLap_v2() {
      if (running_v2) {
        const lapTime = elapsedTime_v2 - lastLapTime_v2;
        laps_v2.unshift({
          number: laps_v2.length + 1,
          time: lapTime,
          total: elapsedTime_v2
        });
        lastLapTime_v2 = elapsedTime_v2;
        
        lapsTitle.style.display = 'block';
        renderLaps();
      }
    }

    function renderLaps() {
      lapsList.innerHTML = laps_v2.map((lap, idx) => `
        <div class="v2-lap-item">
          <span class="v2-lap-number">Lap ${lap.number}</span>
          <span class="v2-lap-time">${formatTimeV2(lap.time)}</span>
        </div>
      `).join('');
    }

    function resetTimer_v2() {
      clearInterval(timer_v2);
      elapsedTime_v2 = 0;
      running_v2 = false;
      laps_v2 = [];
      lastLapTime_v2 = 0;
      
      display_v2.textContent = "00:00";
      subsecond_v2.textContent = ".00";
      
      startBtn_v2.classList.remove('hidden');
      pauseBtn_v2.classList.add('hidden');
      pauseBtn_v2.textContent = "PAUSE";
      lapBtn_v2.style.opacity = '0.5';
      lapBtn_v2.style.pointerEvents = 'none';
      
      lapsTitle.style.display = 'none';
      lapsList.innerHTML = '';
      
      updateQuote();
    }

    startBtn_v2.addEventListener("click", startTimer_v2);
    pauseBtn_v2.addEventListener("click", () => {
      running_v2 ? pauseTimer_v2() : resumeTimer_v2();
    });
    lapBtn_v2.addEventListener("click", recordLap_v2);
    resetBtn_v2.addEventListener("click", resetTimer_v2);

    // Set initial lap button state
    lapBtn_v2.style.opacity = '0.5';
    lapBtn_v2.style.pointerEvents = 'none';
  </script>

</body>
</html>
