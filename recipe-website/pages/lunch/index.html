<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/webpages/recipe-website/assets/icons/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lunch</title>

  <link rel="stylesheet" href="../../styles.css">
</head>

<body>

  <div id="navbar"></div>

  <section class="searchbar">
    <div class="search">
      <input id="searchInput" type="text" placeholder="Find a recipe or ingredient">
      <button onclick="searchRecipe()">⌕</button>
    </div>
  </section>

  <section class="section">
    <h1>Lunch Categories</h1>

    <div class="recipe-grid-3">

      <a class="recipe-card" href="vegetarian/index.html">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=900&q=80" alt="Vegetarian">

        <span class="tag">LUNCH</span>

        <div class="card-body">
          <h2>Vegetarian</h2>
          <div class="meta">★★★★★ Vegetarian lunch recipes</div>
          <button class="save-btn" type="button">View Recipes</button>
        </div>
      </a>

      <a class="recipe-card" href="non-vegetarian/index.html">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=900&q=80" alt="Non-Vegetarian">

        <span class="tag">LUNCH</span>

        <div class="card-body">
          <h2>Non-Vegetarian</h2>
          <div class="meta">★★★★★ Non-vegetarian lunch recipes</div>
          <button class="save-btn" type="button">View Recipes</button>
        </div>
      </a>

    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Food. All recipes by Anand.</p>
  </footer>

  <script src="../../script.js"></script>

</body>
</html>
